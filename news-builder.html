    function wireBreakingNewsClick(list) {
      const bnItem = list.querySelector('[data-breaking-news]');
      if (!bnItem) return;
      bnItem.querySelector('.accordion-header').addEventListener('click', () => {
        if (appState.selectedCardIndex === -2) clearCardEditor();
        else selectBreakingNews();
      });
      if (appState.selectedCardIndex === -2) buildBreakingNewsPanel();

    function selectBreakingNews() {
      appState.selectedCardIndex = -2;
      _renderTarget = null;
      renderAllCards();
      renderCardStack();
      renderMasthead();
      buildBreakingNewsPanel();
    }

    function buildBreakingNewsPanel() {
      const section = document.getElementById('breaking-news-controls-section');
      if (!section || !appState.currentPage) return;
      const page = appState.currentPage;
      const isLive = page.showBreakingNews;
      const user = appState.session?.user;
      const userName = user?.user_metadata?.full_name || user?.email || 'Unknown';

      // Helper: format time
      function fmtTime(d) {
        return new Date(d).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      }
      function fmtCountdown(ms) {
        if (ms <= 0) return '0:00';
        const totalSec = Math.floor(ms / 1000);
        const m = Math.floor(totalSec / 60);
        const s = totalSec % 60;
        return `${m}m ${s.toString().padStart(2, '0')}s`;
      }

      if (isLive) {
        // Live state: banner + status + remove
        section.innerHTML = `
          <div class="bn-panel-live-banner">
            <span class="bn-panel-live-dot"></span>
            Breaking news bar is live
          </div>
          <div class="panel-section">
            <div class="log-row"><span class="log-key">Published by</span><span class="log-val" id="bn-log-publisher">${escapeHtml(page.breakingNewsPublishedBy || '—')}</span></div>
            <div class="log-row"><span class="log-key">Active since</span><span class="log-val" id="bn-log-since">${page.breakingNewsPublishedAt ? fmtTime(page.breakingNewsPublishedAt) : '—'}</span></div>
            <div class="log-row"><span class="log-key">Expires</span><span class="log-val" id="bn-log-expires">${page.breakingNewsExpiresAt ? fmtTime(page.breakingNewsExpiresAt) : 'No expiry — remove manually'}</span></div>
            ${page.breakingNewsExpiresAt ? `<div class="log-row"><span class="log-key">Remaining</span><span class="log-val bn-countdown" id="bn-log-countdown">—</span></div>` : ''}
          </div>
          <div class="panel-section">
            <button id="bn-remove-btn">Remove bar</button>
          </div>`;

        // Wire remove
        document.getElementById('bn-remove-btn').addEventListener('click', () => {
          if (!confirm('Remove the breaking news bar? Readers will no longer see it.')) return;
          clearTimeout(_bnCountdownTimer);
          page.showBreakingNews = false;
          page.breakingNewsExpiresAt = null;
          page.breakingNewsPublishedAt = null;
          page.breakingNewsPublishedBy = null;
          savePage();
          appState.selectedCardIndex = null;
          renderCardStack();
          renderMasthead();
        });

        // Start countdown if timed
        if (page.breakingNewsExpiresAt) {
          clearTimeout(_bnCountdownTimer);
          (function tick() {
            const el = document.getElementById('bn-log-countdown');
            if (!el) return;
            const ms = new Date(page.breakingNewsExpiresAt) - Date.now();
            if (ms <= 0) {
              page.showBreakingNews = false;
              page.breakingNewsExpiresAt = null;
              savePage();
              renderCardStack();
              renderMasthead();
              return;
            }
            el.textContent = fmtCountdown(ms);
            _bnCountdownTimer = setTimeout(tick, 500);
          })();
        }

      } else {
        // Pre-live state: all controls
        const hasLabel = page.breakingNewsLabel && page.breakingNewsLabel !== '__custom__';
        const customVisible = page.breakingNewsLabel && !['BREAKING NEWS','DEVELOPING','HAPPENING NOW','ALERT'].includes(page.breakingNewsLabel);
        const canGoLive = (page.breakingNewsLabel || '').trim().length > 0 && (page.breakingNewsText || '').trim().length > 0;
        const labelOptions = ['BREAKING NEWS','DEVELOPING','HAPPENING NOW','ALERT'];
        const isCustom = !labelOptions.includes(page.breakingNewsLabel || 'BREAKING NEWS');

        section.innerHTML = `
          <div id="bn-fields">
            <div class="panel-section">
              <div class="panel-section-title">Bar Color</div>
              <div class="color-picker">
                <button class="color-swatch${page.breakingNewsColor !== 'black' ? ' active' : ''}" data-color="red" title="For urgent, breaking news — use sparingly">Red</button>
                <button class="color-swatch${page.breakingNewsColor === 'black' ? ' active' : ''}" data-color="black" title="For live events, press conferences, or lower-urgency alerts">Black</button>
              </div>
            </div>
            <div class="panel-section">
              <div class="panel-section-title">Alert Label</div>
              <select class="control-input" id="bn-label-select">
                <option value="BREAKING NEWS"${page.breakingNewsLabel === 'BREAKING NEWS' || !isCustom && !page.breakingNewsLabel ? ' selected' : ''}>BREAKING NEWS</option>
                <option value="DEVELOPING"${page.breakingNewsLabel === 'DEVELOPING' ? ' selected' : ''}>DEVELOPING</option>
                <option value="HAPPENING NOW"${page.breakingNewsLabel === 'HAPPENING NOW' ? ' selected' : ''}>HAPPENING NOW</option>
                <option value="ALERT"${page.breakingNewsLabel === 'ALERT' ? ' selected' : ''}>ALERT</option>
                <option value="__custom__"${isCustom ? ' selected' : ''}>Custom…</option>
              </select>
              <div id="bn-custom-label-wrap" style="${isCustom ? '' : 'display:none;'}margin-top:7px;">
                <input class="control-input" type="text" id="bn-custom-label" placeholder="Enter label text" maxlength="28" value="${isCustom ? escapeHtml(page.breakingNewsLabel || '') : ''}">
              </div>
            </div>
            <div class="panel-section">
              <div class="panel-section-title">Body Text</div>
              <textarea class="control-input" id="bn-text" placeholder="e.g. Officials confirm emergency evacuation order for Lake Anne area.">${escapeHtml(page.breakingNewsText || '')}</textarea>
            </div>
            <div class="panel-section">
              <div class="panel-section-title">Link URL <span class="optional">(optional)</span></div>
              <input class="control-input" type="url" id="bn-url" placeholder="https://…" value="${escapeHtml(page.breakingNewsUrl || '')}">
            </div>
            <div class="panel-section">
              <div class="panel-section-title">Duration</div>
              <div class="duration-grid">
                <button class="dur-btn${(page._bnDuration || 15) === 15 ? ' active' : ''}" data-min="15">15 min</button>
                <button class="dur-btn${page._bnDuration === 30 ? ' active' : ''}" data-min="30">30 min</button>
                <button class="dur-btn${page._bnDuration === 60 ? ' active' : ''}" data-min="60">60 min</button>
                <button class="dur-btn${page._bnDuration === null ? ' active' : ''}" data-forever="1">Forever</button>
              </div>
            </div>
            <div class="panel-section">
              <button id="bn-publish-btn" ${canGoLive ? '' : 'disabled'}>⚡ Go Live</button>
              <div id="clear-all-row"><a id="bn-clear-all">Clear all</a></div>
            </div>
          </div>`;

        // Color swatches
        section.querySelectorAll('.color-swatch').forEach(btn => {
          btn.addEventListener('click', () => {
            section.querySelectorAll('.color-swatch').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            page.breakingNewsColor = btn.dataset.color;
            scheduleSave();
            renderMasthead();
          });
        });

        // Label select
        document.getElementById('bn-label-select').addEventListener('change', function() {
          const wrap = document.getElementById('bn-custom-label-wrap');
          const isC = this.value === '__custom__';
          wrap.style.display = isC ? '' : 'none';
          if (!isC) page.breakingNewsLabel = this.value;
          if (isC) document.getElementById('bn-custom-label').focus();
          updateBnPublishBtn();
          scheduleSave();
          renderMasthead();
        });

        // Custom label input
        const customInput = document.getElementById('bn-custom-label');
        if (customInput) {
          customInput.addEventListener('input', function() {
            page.breakingNewsLabel = this.value;
            updateBnPublishBtn();
            scheduleSave();
            renderMasthead();
          });
        }

        // Body text
        document.getElementById('bn-text').addEventListener('input', function() {
          page.breakingNewsText = this.value;
          updateBnPublishBtn();
          scheduleSave();
          renderMasthead();
        });

        // URL
        document.getElementById('bn-url').addEventListener('input', function() {
          page.breakingNewsUrl = this.value;
          scheduleSave();
          renderMasthead();
        });

        // Duration buttons
        section.querySelectorAll('.dur-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            section.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            page._bnDuration = btn.dataset.forever ? null : Number(btn.dataset.min);
          });
        });

        // Go Live
        document.getElementById('bn-publish-btn').addEventListener('click', () => {
          const duration = page._bnDuration !== undefined ? page._bnDuration : 15;
          page.showBreakingNews = true;
          page.breakingNewsPublishedAt = new Date().toISOString();
          page.breakingNewsExpiresAt = duration ? new Date(Date.now() + duration * 60 * 1000).toISOString() : null;
          page.breakingNewsPublishedBy = userName;
          savePage();
          renderCardStack();
          renderMasthead();
          buildBreakingNewsPanel();
        });

        // Clear all
        document.getElementById('bn-clear-all').addEventListener('click', () => {
          if (!confirm('Clear all breaking news fields?')) return;
          page.breakingNewsLabel = 'BREAKING NEWS';
          page.breakingNewsText = '';
          page.breakingNewsUrl = '';
          page.breakingNewsColor = 'red';
          page._bnDuration = 15;
          scheduleSave();
          buildBreakingNewsPanel();
          renderMasthead();
        });
      }

      function updateBnPublishBtn() {
        const btn = document.getElementById('bn-publish-btn');
        if (!btn) return;
        const label = page.breakingNewsLabel || '';
        const text  = page.breakingNewsText  || '';
        btn.disabled = !(label.trim().length > 0 && text.trim().length > 0);
      }
    }

    function selectMasthead() {

      renderMasthead();
      buildMastheadPanel();

    // Inline editing
    const editUndoStack = [];

    function attachInlineEditors() {
      document.querySelectorAll('.editable-wrap').forEach(wrap => {
        wrap.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          const field = wrap.dataset.field;
          const textEl = wrap.querySelector(field === 'headline' ? '.headline' : field === 'blurb' ? '.blurb' : '.caption');
          if (!textEl || textEl.contentEditable === 'true') return;
          const prevValue = state[field] || '';
          const pencil = wrap.querySelector('.edit-pencil');
          if (pencil) { pencil.style.opacity = '0'; pencil.style.pointerEvents = 'none'; }
          textEl.contentEditable = 'true';
          textEl.style.outline = 'none';
          textEl.style.borderBottom = '1.5px solid rgba(0,0,0,0.25)';
          textEl.style.paddingBottom = '1px';
          // Remove href so clicks inside the editable don't navigate; render() restores it
          const link = wrap.querySelector('a[href]');
          if (link) link.removeAttribute('href');
          textEl.focus();
          const range = document.createRange();
          range.selectNodeContents(textEl);
          range.collapse(false);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          let done = false;
          function save() {
            if (done) return;
            done = true;
            const newVal = textEl.textContent.trim();
            textEl.contentEditable = 'false';
            textEl.style.borderBottom = '';
            textEl.style.paddingBottom = '';
            window.getSelection().removeAllRanges();
            textEl.blur();
            if (newVal !== prevValue) {
              editUndoStack.push({ field, prevValue });
              state[field] = newVal;
              if (field === 'headline') { const el = document.getElementById('input-headline'); if (el) el.value = newVal; }
              if (field === 'blurb') { const el = document.getElementById('input-blurb'); if (el) el.value = newVal; }
              if (field === 'caption') { const el = document.getElementById('input-caption'); if (el) el.value = newVal; }
            }
            render();
          }
          function cancel() {
            if (done) return;
            done = true;
            textEl.contentEditable = 'false';
            textEl.style.borderBottom = '';
            textEl.style.paddingBottom = '';
            window.getSelection().removeAllRanges();
            render();
          }
          textEl.addEventListener('keydown', function onKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); textEl.removeEventListener('keydown', onKey); save(); }
            else if (e.key === 'Escape') { textEl.removeEventListener('keydown', onKey); cancel(); }
          });
          textEl.addEventListener('blur', function onBlur() { textEl.removeEventListener('blur', onBlur); if (!done) save(); });
        });
      });
    }

    const WAPO_SECTIONS = new Set([
      'politics','national','world','business','sports','entertainment',

    async function fetchRelatedArticles() {
      if (!state.lastImportedSection) return;
      try {
        const section = WAPO_SECTIONS.has(state.lastImportedSection)
          ? state.lastImportedSection : 'national';
        const wapoRssUrl = 'https://feeds.washingtonpost.com/rss/' + section;

        // Primary: WaPo native RSS via Vercel proxy (real WaPo URLs + titles)
        // Fallback: rss2json with same feed
        const tryProxy = fetch('/api/rss?url=' + encodeURIComponent(wapoRssUrl))
          .then(r => r.json()).then(j => j.items?.length ? j.items : null).catch(() => null);
        const tryRss2json = fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(wapoRssUrl))
          .then(r => r.json()).then(j => (j.status === 'ok' && j.items?.length)
            ? j.items.map(i => ({ title: i.title || '', link: i.link || '' })) : null).catch(() => null);

        const results = await Promise.all([tryProxy, tryRss2json]);
        const rawItems = results[0] || results[1];
        if (!rawItems) return;
        const existing = new Set([state.headline].map(t => (t || '').trim().toLowerCase()));
        const NON_ARTICLE = /^(watch|video|listen|podcast|gallery|photos?|opinion newsletter|the daily 202|the 7[:\s]|today'?s headlines|your evening|your morning|good morning|what to (know|read|watch)|newsletter|latest from the post)[:\s,]?/i;
        const decodeEntities = s => s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
        const items = rawItems
          .map(item => ({ title: decodeEntities((item.title || '').replace(/\s*-\s*(The Washington Post|Washington Post)\s*$/i, '').trim()), link: item.link || '' }))
          .filter(({ title }) => title && !existing.has(title.toLowerCase()) && !NON_ARTICLE.test(title))
          .slice(0, 4);
        items.forEach(({ title, link }, i) => {
          state.supportingHeadlines[i] = title;
          state.supportingUrls[i] = link;
          const ta = document.getElementById('input-sh-' + i);
          if (ta) ta.value = title;
          const urlInput = document.getElementById('input-sh-url-' + i);
          if (urlInput) urlInput.value = link;
        });
        if (items.length > 0) render();
      } catch (e) { console.log('[suggest] outer error:', e.message); }
    }

            <input class="control-input" type="text" id="input-overlay-label" placeholder="Button label" value="${state.overlayButtonLabel}">
            <label class="control-label"><input type="checkbox" id="input-show-overlay-duration" ${state.showOverlayDuration ? 'checked' : ''}> Show duration</label>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-section-title">Supporting Headlines</div>
          <div class="control-row">
            <label class="control-label" for="input-lead-plus">Count</label>
            <select class="control-input" id="input-lead-plus">
              <option value="0"  ${state.leadPlus === 0  ? 'selected' : ''}>0</option>
              <option value="1"  ${state.leadPlus === 1  ? 'selected' : ''}>1</option>
              <option value="2"  ${state.leadPlus === 2  ? 'selected' : ''}>2</option>
              <option value="3"  ${state.leadPlus === 3  ? 'selected' : ''}>3</option>
              <option value="4"  ${state.leadPlus === 4  ? 'selected' : ''}>4+</option>
            </select>
          </div>

          <div id="sh-row-0" style="display:${state.leadPlus >= 1 ? 'block' : 'none'}">
            <div class="control-row">
              <label class="control-label" for="input-sh-0">Headline 1</label>
              <textarea class="control-input" id="input-sh-0" rows="2">${state.supportingHeadlines[0]}</textarea>
            </div>
            <div class="control-row">
              <label class="control-label" for="input-sh-url-0">URL</label>
              <input class="control-input" type="url" id="input-sh-url-0" placeholder="Paste URL or press Enter to import…" value="${state.supportingUrls[0] || ''}">
              <div id="sh-url-status-0" style="font-size:11px;min-height:14px;margin-top:3px;"></div>
            </div>
          </div>
          <div id="sh-row-1" style="display:${state.leadPlus >= 2 ? 'block' : 'none'}">
            <div class="control-row">
              <label class="control-label" for="input-sh-1">Headline 2</label>
              <textarea class="control-input" id="input-sh-1" rows="2">${state.supportingHeadlines[1]}</textarea>
            </div>
            <div class="control-row">
              <label class="control-label" for="input-sh-url-1">URL</label>
              <input class="control-input" type="url" id="input-sh-url-1" placeholder="Paste URL or press Enter to import…" value="${state.supportingUrls[1] || ''}">
              <div id="sh-url-status-1" style="font-size:11px;min-height:14px;margin-top:3px;"></div>
            </div>
          </div>
          <div id="sh-row-2" style="display:${state.leadPlus >= 3 ? 'block' : 'none'}">
            <div class="control-row">
              <label class="control-label" for="input-sh-2">Headline 3</label>
              <textarea class="control-input" id="input-sh-2" rows="2">${state.supportingHeadlines[2]}</textarea>
            </div>
            <div class="control-row">
              <label class="control-label" for="input-sh-url-2">URL</label>
              <input class="control-input" type="url" id="input-sh-url-2" placeholder="Paste URL or press Enter to import…" value="${state.supportingUrls[2] || ''}">
              <div id="sh-url-status-2" style="font-size:11px;min-height:14px;margin-top:3px;"></div>
            </div>
          </div>
          <div id="sh-row-3" style="display:${state.leadPlus >= 4 ? 'block' : 'none'}">
            <div class="control-row">
              <label class="control-label" for="input-sh-3">Headline 4</label>
              <textarea class="control-input" id="input-sh-3" rows="2">${state.supportingHeadlines[3]}</textarea>
            </div>
            <div class="control-row">
              <label class="control-label" for="input-sh-url-3">URL</label>
              <input class="control-input" type="url" id="input-sh-url-3" placeholder="Paste URL or press Enter to import…" value="${state.supportingUrls[3] || ''}">
              <div id="sh-url-status-3" style="font-size:11px;min-height:14px;margin-top:3px;"></div>
            </div>
          </div>
        </div>


      `;

      document.getElementById('input-lead-plus').addEventListener('change', function () {
        state.leadPlus = parseInt(this.value);
        render();
        document.getElementById('sh-row-0').style.display = state.leadPlus >= 1 ? 'flex' : 'none';
        document.getElementById('sh-row-1').style.display = state.leadPlus >= 2 ? 'flex' : 'none';
        document.getElementById('sh-row-2').style.display = state.leadPlus >= 3 ? 'flex' : 'none';
        document.getElementById('sh-row-3').style.display = state.leadPlus >= 4 ? 'flex' : 'none';
      });

      document.getElementById('input-show-package-label').addEventListener('change', function () {
        state.showPackageLabel = this.checked;
        document.getElementById('package-label-text-row').style.display = this.checked ? 'flex' : 'none';
        render();
      });

      document.getElementById('input-package-label-text').addEventListener('input', function () {
        state.packageLabelText = this.value;
        render();
      });

      document.getElementById('input-live').addEventListener('change', function () {
        state.showLive = this.checked;
        if (this.checked) {
          state.showKicker = false;
          document.getElementById('input-kicker').checked = false;
          document.getElementById('kicker-text-row').style.display = 'none';
        }
        render();
      });

      document.getElementById('input-kicker').addEventListener('change', function () {
        state.showKicker = this.checked;
        document.getElementById('kicker-text-row').style.display = this.checked ? 'block' : 'none';
        if (this.checked) {
          state.showLive = false;
          document.getElementById('input-live').checked = false;
        }
        render();
      });

      document.getElementById('input-kicker-text').addEventListener('input', function () {
        state.kickerSection = this.value;
        render();
      });

      document.getElementById('input-ticker').addEventListener('change', function () {
        state.showTicker = this.checked;
        render();
      });

      document.getElementById('input-show-headline').addEventListener('change', function () {
        state.showHeadline = this.checked;
        render();
      });

      document.getElementById('input-show-blurb').addEventListener('change', function () {
        state.showBlurb = this.checked;
        render();
      });

      document.getElementById('input-headline').addEventListener('input', function () {
        state.headline = this.value;
        render();
      });
      document.getElementById('input-headline').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.blur(); }
      });

      document.getElementById('input-blurb').addEventListener('input', function () {
        state.blurb = this.value;
        render();
      });
      document.getElementById('input-blurb').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.blur(); }
      });


      document.getElementById('input-aspect-ratio').addEventListener('change', function () {
        state.aspectRatio = this.value;
        render();
      });

      document.getElementById('input-portrait').addEventListener('change', function () {
        state.portrait = this.checked;
        render();
      });

      document.getElementById('input-caption').addEventListener('input', function () {
        state.caption = this.value;
        render();
      });

      document.getElementById('input-show-overlay').addEventListener('change', function () {
        state.showOverlayButton = this.checked;
        document.getElementById('overlay-fields').style.display = this.checked ? 'flex' : 'none';
        render();
      });

      document.getElementById('input-overlay-label').addEventListener('input', function () {
        state.overlayButtonLabel = this.value;
        render();
      });

      document.getElementById('input-show-overlay-duration').addEventListener('change', function () {
        state.showOverlayDuration = this.checked;
        render();
      });

      async function importShUrl(i, url, urlEl) {
        const ta = document.getElementById('input-sh-' + i);
        const statusEl = document.getElementById('sh-url-status-' + i);
        const setStatus = (msg, color) => { if (statusEl) { statusEl.textContent = msg; statusEl.style.color = color; } };
        // Immediately clear old headline and show skeleton
        state.supportingHeadlines[i] = '';
        if (ta) {
          ta.value = '';
          ta.style.background = 'linear-gradient(90deg, #ebebeb 25%, #f5f5f5 50%, #ebebeb 75%)';
          ta.style.backgroundSize = '200% 100%';
          ta.style.animation = 'sh-skeleton-pulse 1.2s ease-in-out infinite';
          ta.style.color = 'transparent';
        }
        render();
        setStatus('Fetching…', '#aaa');
        try {
          const res = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(url));
          const json = await res.json();
          if (json.status !== 'success') throw new Error('Import failed');
          const title = json.data?.title;
          const clearSkeleton = () => {
            if (ta) {
              ta.style.background = '';
              ta.style.backgroundSize = '';
              ta.style.animation = '';
              ta.style.color = '';
            }
          };
          clearSkeleton();
          if (title) {
            state.supportingHeadlines[i] = title;
            if (ta) ta.value = title;
            render();
            setStatus('Imported.', '#5cb85c');
          } else {
            setStatus('No headline found.', '#e07070');
          }
          setTimeout(() => setStatus('', ''), 2500);
        } catch (e) {
          if (ta) {
            ta.style.background = '';
            ta.style.backgroundSize = '';
            ta.style.animation = '';
            ta.style.color = '';
          }
          setStatus('Failed — check URL.', '#e07070');
          setTimeout(() => setStatus('', ''), 2500);
        }
      }

      [0, 1, 2, 3].forEach(i => {
        document.getElementById(`input-sh-${i}`).addEventListener('input', function () {
          state.supportingHeadlines[i] = this.value;
          state.supportingUrls[i] = '';
          render();
        });
        document.getElementById(`input-sh-${i}`).addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.blur(); }
        });
        const urlEl = document.getElementById(`input-sh-url-${i}`);
        let shUrlTimer = null;
        urlEl.addEventListener('input', function () {
          const val = this.value.trim();
          state.supportingUrls[i] = val;
          render();
          clearTimeout(shUrlTimer);
          if (val.startsWith('http')) {
            shUrlTimer = setTimeout(() => importShUrl(i, val, urlEl), 800);
          }
        });
        urlEl.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            const val = this.value.trim();
            if (val.startsWith('http')) {
              clearTimeout(shUrlTimer);
              importShUrl(i, val, urlEl);
            }
          }
        });
      });



      function getRecentImports() {
        try { return JSON.parse(localStorage.getItem('sc-recents') || '[]'); } catch (_) { return []; }
      }
      function addRecentImport(url, headline) {
        const list = getRecentImports().filter(r => r.url !== url);
        list.unshift({ url, headline });
        localStorage.setItem('sc-recents', JSON.stringify(list.slice(0, 8)));
        renderRecentsDropdown();
      }
      function renderRecentsDropdown() {
        const dd = document.getElementById('recents-dropdown');
        if (!dd) return;
        const list = getRecentImports();
        if (list.length === 0) {
          dd.innerHTML = '<div class="recents-empty">No recent imports</div>';
        } else {
          dd.innerHTML = list.map((r, i) =>
            `<div class="recents-item" data-i="${i}" title="${r.url}">${r.headline}</div>`
          ).join('');
          dd.querySelectorAll('.recents-item').forEach(el => {
            el.addEventListener('click', function () {
              document.getElementById('import-url').value = getRecentImports()[+this.dataset.i].url;
              dd.classList.remove('open');
              const btn = document.getElementById('recents-btn');
              if (btn) btn.textContent = 'Recent ▾';
              const status = document.getElementById('import-status');
              if (status) { status.textContent = ''; status.style.color = ''; }
              document.getElementById('import-btn').click();
            });
          });
        }
      }
      document.getElementById('recents-btn').addEventListener('click', function () {
        const dd = document.getElementById('recents-dropdown');
        renderRecentsDropdown();
        dd.classList.toggle('open');
        this.textContent = dd.classList.contains('open') ? 'Recent ▴' : 'Recent ▾';
      });

      document.getElementById('import-url').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); document.getElementById('import-btn').click(); }
      });

      document.getElementById('import-btn').addEventListener('click', async function () {
        const btn = this;
        const url = document.getElementById('import-url').value.trim();
        const status = document.getElementById('import-status');
        if (!url) { status.textContent = 'Paste a URL first.'; return; }

        btn.disabled = true;
        btn.innerHTML = '<span class="import-spinner"></span>Importing…';
        status.textContent = '';
        importingText = true;
        importingImage = true;
        _importInProgress = true;
        const _importList = document.getElementById('card-stack-list');
        const _importItem = _importList?.querySelector(`.accordion-item[data-index="${appState.selectedCardIndex}"]`);
        if (_importList)  _importList.classList.add('import-locked');
        if (_importItem)  _importItem.classList.add('accordion-importing');
        render();

        try {
          const res = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(url) + '&data.caption.selector=' + encodeURIComponent('[data-testid="lede-art-caption"]') + '&data.caption.type=text');
          const json = await res.json();
          if (json.status !== 'success') throw new Error(json.message || 'Import failed');
          const { title, description, image, caption } = json.data;
          if (title) { state.headline = title; document.getElementById('input-headline').value = title; }
          if (description) { state.blurb = description; document.getElementById('input-blurb').value = description; }
          if (caption) { state.caption = caption; document.getElementById('input-caption').value = caption; }
          state.articleUrl = url;
          state.lastImportedSection = getWaPoSection(url);
          if (title) addRecentImport(url, title);
          // Text is ready — reveal it immediately, image skeleton stays
          importingText = false;
          render();
          fetchRelatedArticles();
          if (image?.url) {
            const proxied = 'https://wsrv.nl/?url=' + encodeURIComponent(image.url);
            await new Promise((resolve) => {
              const img = new Image();
              img.onload = function () {
                state.imageUrl = proxied;
                importingImage = false;
                render();
                resolve();
              };
              img.onerror = function () {
                importingImage = false;
                render();
                resolve();
              };
              img.src = proxied;
            });
            status.style.color = '#5cb85c';
            status.textContent = 'Imported.';
          } else {
            importingImage = false;
            render();
            status.style.color = '#5cb85c';
            status.textContent = 'Imported.';
          }
        } catch (e) {
          importingText = false;
          importingImage = false;
          render();
          status.style.color = '#c00';
          status.textContent = 'Error: ' + e.message;
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'Import';
          _importInProgress = false;
          if (_importList)  _importList.classList.remove('import-locked');
          if (_importItem)  _importItem.classList.remove('accordion-importing');
        }
      });
    }
    /* ── End Story Card Engine ───────────────────────────────────────── */

    // ── Logo sticky scroll behavior ────────────────────
    document.querySelector('.editor-left').addEventListener('scroll', () => {
      const el = document.getElementById('masthead-placeholder');
      if (el) el.classList.toggle('stuck', document.querySelector('.editor-left').scrollTop > 8);
    });

    initAuth();
  </script>
