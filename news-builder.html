<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300,0,0" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="engine.css">
  <script src="engine.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: #ebebeb;
      color: #111111;
      min-height: 100vh;
    }

    /* ── View containers ── */
    .view { display: none; min-height: 100vh; }
    .view.active { display: flex; }

    /* ── Login view ── */
    #view-login {
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 40px;
      width: 360px;
    }

    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 13px;
      color: #777;
      margin-bottom: 28px;
    }

    .login-field {
      margin-bottom: 14px;
    }

    .login-field label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .login-field input {
      width: 100%;
      height: 38px;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 4px;
      color: #111;
      font-family: inherit;
      font-size: 14px;
      padding: 0 12px;
      outline: none;
    }

    .login-field input:focus { border-color: #999; }

    #login-btn {
      width: 100%;
      height: 40px;
      margin-top: 8px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    #login-btn:hover { background: #333; }
    #login-btn:disabled { background: #ccc; color: #999; cursor: not-allowed; }

    #login-error {
      margin-top: 12px;
      font-size: 13px;
      color: #cc3333;
      min-height: 18px;
      text-align: center;
    }

    .login-status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
      text-align: center;
    }
    .login-status.error { color: #cc3333; }
    .login-status.success { color: #2a9d2a; }

    .login-text-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      text-align: center;
      padding: 0;
    }
    .login-text-btn:hover { color: #333; text-decoration: underline; }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 0;
      color: #bbb;
      font-size: 12px;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }

    .btn-google {
      width: 100%;
      height: 40px;
      margin-top: 12px;
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-google:hover { background: #f5f5f5; border-color: #bbb; }

    /* ── List view ── */
    #view-list {
      flex-direction: column;
    }

    .list-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      height: 52px;
      background: #111;
      border-bottom: none;
    }

    .list-header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .btn-primary {
      height: 32px;
      padding: 0 14px;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 2px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .btn-primary:hover { background: #e8e8e8; }

    .btn-ghost {
      height: 32px;
      padding: 0 14px;
      background: transparent;
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 2px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .btn-ghost:hover { color: #fff; border-color: rgba(255,255,255,0.7); }

    .list-identity {
      display: flex;
      align-items: center;
      gap: 7px;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      user-select: none;
    }
    .list-identity:hover { color: rgba(255,255,255,0.85); }
    .list-identity .material-symbols-outlined {
      font-size: 22px;
      font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 20;
    }

    #identity-wrap { position: relative; }

    .profile-panel {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 280px;
      background: #1c1c2e;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 200;
      color: #fff;
    }
    .profile-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      object-fit: cover; display: block; margin-bottom: 12px;
    }
    .profile-avatar-initials {
      width: 52px; height: 52px; border-radius: 50%;
      background: #5566ff; display: flex; align-items: center;
      justify-content: center; font-size: 22px; font-weight: 700;
      color: #fff; margin-bottom: 12px;
    }
    .profile-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .profile-email { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 16px; }
    .profile-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 12px 0; }
    .profile-row {
      display: flex; justify-content: space-between;
      align-items: center; font-size: 12px; margin-bottom: 8px;
    }
    .profile-row-label {
      color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
    }
    .profile-row-value { color: rgba(255,255,255,0.8); font-weight: 600; }
    .profile-signout-btn {
      width: 100%; margin-top: 16px; height: 36px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px; color: rgba(255,255,255,0.7); font-family: inherit;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .profile-signout-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

    .list-toolbar {
      padding: 16px 24px 0;
      display: flex;
      justify-content: flex-end;
    }

    #pages-grid {
      padding: 12px 24px 24px;
    }

    .pages-table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border: 1px solid #c8c8c8;
    }

    .pages-table th {
      text-align: left;
      padding: 11px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #fff;
      background: #333;
      border-bottom: none;
    }

    .pages-table td {
      padding: 13px 16px;
      border-bottom: 1px solid #e8e8e8;
      font-size: 13px;
      color: #333;
    }

    .pages-table tbody tr:last-child td { border-bottom: none; }
    .pages-table tbody tr { cursor: pointer; }
    .pages-table tbody tr:nth-child(even) td { background: #f9f9f9; }
    .pages-table tbody tr:hover td { background: #eef0ff !important; }

    .page-row-name {
      font-weight: 700;
      color: #111 !important;
      font-size: 14px !important;
    }

    .page-row-delete-btn {
      height: 26px;
      padding: 0 10px;
      background: transparent;
      color: #888;
      border: 1px solid #ccc;
      border-radius: 2px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
    }

    .page-row-delete-btn:hover { color: #cc3333; border-color: #cc3333; background: #fff5f5; }

    .page-row-dup-btn {
      height: 26px;
      padding: 0 10px;
      background: transparent;
      color: #888;
      border: 1px solid #ccc;
      border-radius: 2px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      margin-right: 6px;
    }
    .page-row-dup-btn:hover { color: #111; border-color: #888; background: #f4f4f4; }

    .page-row-preview-btn {
      display: inline-flex;
      align-items: center;
      height: 26px;
      padding: 0 10px;
      background: transparent;
      color: #888;
      border: 1px solid #ccc;
      border-radius: 2px;
      text-decoration: none;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-right: 6px;
      white-space: nowrap;
    }
    .page-row-preview-btn:hover { color: #111; border-color: #888; background: #f4f4f4; }

    .pages-table th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
    .pages-table th.sortable:hover { background: #444; }
    .pages-table th.sortable .sort-arrow { display: inline-block; margin-left: 5px; opacity: 0.4; font-size: 10px; }
    .pages-table th.sortable.active { background: #5566ff; }
    .pages-table th.sortable.active .sort-arrow { opacity: 1; }

    @keyframes newRowHighlight {
      0%, 75% { background: #eef0ff; }
      100%     { background: transparent; }
    }
    .pages-table tbody tr.page-row-new td { animation: newRowHighlight 3.5s ease forwards; }

    .list-empty {
      padding: 60px 0;
      text-align: center;
      color: #999;
      font-size: 14px;
      background: #fff;
      border: 1px solid #c8c8c8;
    }

    /* ── Editor view ── */
    #view-editor {
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .editor-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 52px;
      background: #111;
      border-bottom: none;
      flex-shrink: 0;
    }

    .editor-page-name {
      background: transparent;
      border: none;
      border-bottom: 1.5px solid transparent;
      border-radius: 3px;
      padding: 2px 6px;
      margin: 0 -6px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      color: #fff;
      letter-spacing: 0.02em;
      flex: 1;
      min-width: 0;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .editor-page-name:hover { background: rgba(255,255,255,0.08); }
    .editor-page-name:focus {
      outline: none;
      cursor: text;
      flex: none;
      width: 450px;
      background: #fff;
      color: #111;
      border-bottom-color: transparent;
      border-radius: 3px;
    }
    .save-status {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
    }
    .save-status.saving { color: rgba(255,255,255,0.5); }
    .save-status.saved  { color: #5ecfa0; }
    .save-status.error  { color: #f07070; }

    .preview-btn {
      flex-shrink: 0;
      height: 28px;
      padding: 0 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 3px;
      color: rgba(255,255,255,0.7);
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .preview-btn:hover {
      border-color: rgba(255,255,255,0.6);
      color: #fff;
      background: rgba(255,255,255,0.08);
    }

    .width-selector,
    .mobile-width-selector {
      display: flex;
      gap: 1px;
      background: #c4c4c4;
      border: 1px solid #b0b0b0;
      border-radius: 3px;
      padding: 2px;
    }

    .width-btn,
    .mobile-width-btn {
      height: 26px;
      padding: 0 10px;
      background: transparent;
      color: #555;
      border: none;
      border-radius: 2px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .width-btn:hover,
    .mobile-width-btn:hover { color: #111; }

    .width-btn.active,
    .mobile-width-btn.active { background: #111; color: #fff; }

    .phone-frame-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: #555;
      cursor: pointer;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .phone-frame-label input[type="checkbox"] {
      cursor: pointer;
      accent-color: #111;
    }

    .editor-body {
      position: relative;
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .editor-left {
      flex: 1;
      overflow-y: auto;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 32px;
      scroll-padding-bottom: 60px;
      position: relative;
    }

    .preview-toolbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 24px;
      margin-bottom: 20px;
    }

    #canvas-controls {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .canvas-ctrl-btn {
      height: 22px;
      padding: 0 8px;
      background: rgba(0, 0, 0, 0.32);
      border: none;
      border-radius: 3px;
      color: rgba(255, 255, 255, 0.55);
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .canvas-ctrl-btn:hover { background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.85); }
    .canvas-ctrl-btn.active { background: rgba(85, 102, 255, 0.8); color: #fff; }

    #card-area {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card-area-placeholder {
      color: #bbb;
      font-size: 16px;
      padding-top: 60px;
    }

    /* Sticky outer shell — holds masthead + breaking news bar together */
    #masthead-sticky-wrap {
      position: sticky;
      top: 0;
      z-index: 10;
      width: 100%;
    }
    #masthead-placeholder {
      background: #fff;
      flex-shrink: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 24px 20px;
      border-bottom: 1px solid transparent;
      transition: padding 0.35s ease, border-color 0.35s ease;
    }
    #masthead-placeholder.stuck {
      padding: 10px 24px;
      border-bottom-color: #e0e0e0;
    }
    #masthead-placeholder img {
      max-width: 440px;
      width: 100%;
      height: auto;
      display: block;
      transition: max-width 0.35s ease;
    }
    #masthead-placeholder.stuck img {
      max-width: 200px;
    }
    #masthead-placeholder.masthead-selected {
      outline: 2px solid #5566ff;
      outline-offset: 4px;
      border-radius: 2px;
    }

    .masthead-item {
      cursor: default !important;
    }
    .masthead-item:active {
      cursor: default !important;
    }

    @keyframes previewCardGlow {
      0%, 25% { box-shadow: 0 0 0 4px rgba(200, 160, 0, 0.9), 0 0 28px rgba(200, 160, 0, 0.45); }
      100%     { box-shadow: 0 0 0 4px rgba(200, 160, 0, 0); }
    }
    .card-wrapper.card-drop-highlight,
    .phone-card-slot.card-drop-highlight {
      animation: previewCardGlow 2s ease forwards;
    }

    .card-wrapper {
      position: relative;
      flex-shrink: 0;
    }

    .card-wrapper + .card-wrapper {
      margin-top: 40px;
      padding-top: 40px;
      border-top: 1px solid #e0e0e0;
    }

    .card-wrapper.selected #card {
      outline: 2px solid #5566ff;
      outline-offset: 4px;
      border-radius: 2px;
    }

    .phone-card-slot {
      position: relative;
    }

    .phone-card-slot + .phone-card-slot {
      margin-top: 40px;
      padding-top: 40px;
      border-top: 12px solid #e0e0e0;
    }

    .phone-card-slot.selected::after {
      content: '';
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 3px #5566ff;
      pointer-events: none;
      z-index: 200;
    }

    .card-select-overlay {
      position: absolute;
      inset: 0;
      z-index: 100;
      cursor: pointer;
    }

    .card-select-overlay:hover::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(85, 102, 255, 0.04);
      border: 2px solid rgba(85, 102, 255, 0.25);
      pointer-events: none;
    }

    .editor-right {
      width: 300px;
      flex-shrink: 0;
      border-left: 2px solid #222;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .stack-section {
      display: flex;
      flex-direction: column;
    }

    .stack-header {
      display: flex;
      align-items: center;
      padding: 0 14px;
      height: 40px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      background: #ffffff;
      z-index: 10;
    }

    .stack-title {
      font-size: 10px;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex: 1;
    }

    .stack-header .btn-primary {
      background: #111;
      color: #fff;
      border-radius: 2px;
    }

    .stack-header .btn-primary:hover { background: #333; }

    .stack-header-pinned { background: #f2f2f2; border-bottom: none; }

    .stack-header-collapse-btn {
      font-size: 14px;
      color: #888;
      margin-right: 2px;
      transition: transform 0.2s ease;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    .stack-header-pinned.collapsed .stack-header-collapse-btn { transform: rotate(-90deg); }

    #pinned-stack-section {
      background: #f2f2f2;
      padding-top: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #d0d0d0;
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease;
      max-height: 9999px;
      opacity: 1;
    }
    #pinned-stack-section.collapsed {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
    }

    #card-stack-list {
      padding: 10px 0 20px;
    }

    /* ── Accordion ── */
    .accordion-item {
      margin: 0 8px 12px;
      border: 1.5px solid #999;
      border-radius: 2px;
      background: #e8e8e8;
      box-shadow: 0 2px 6px rgba(0,0,0,0.13);
      cursor: grab;
      user-select: none;
    }

    .accordion-item:active { cursor: grabbing; }
    .accordion-item.dragging { opacity: 0.35; }

    @keyframes newCardHighlight {
      0%, 72% { background: #ffe066; border-color: #c8a000; box-shadow: 0 2px 10px rgba(200,160,0,0.4); }
      100%     { background: #e8e8e8; border-color: #999;   box-shadow: 0 2px 6px rgba(0,0,0,0.13); }
    }
    .accordion-item.accordion-item-new { animation: newCardHighlight 3.5s ease forwards; }
    .accordion-item.accordion-item-dropped { animation: newCardHighlight 2s ease forwards; }

    .accordion-item.open {
      border-color: #5566ff;
      border-left: 4px solid #5566ff;
      background: #e8e8e8;
      box-shadow: 0 2px 8px rgba(85,102,255,0.18);
    }

    .accordion-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 10px 12px 8px;
    }

    .accordion-header:hover { background: rgba(0,0,0,0.06); }
    .accordion-item.open > .accordion-header {
      background: #dde0ff;
      border-bottom: 1.5px solid #b8bcf0;
    }

    .accordion-body-wrap {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 380ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .accordion-item.open > .accordion-body-wrap {
      grid-template-rows: 1fr;
    }

    .accordion-body-inner {
      overflow: hidden;
    }

    .accordion-item.dragging { opacity: 0.35; }

    /* Import lock */

    /* Supporting headlines */
    /* .supporting-headline, .h-rule → engine.css */

    /* Phone preset buttons */

    @keyframes sh-skeleton-pulse {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* .card-skeleton + keyframes → engine.css */

    .sh-skeleton {
      background: linear-gradient(90deg, #ebebeb 25%, #f5f5f5 50%, #ebebeb 75%) !important;
      background-size: 200% 100% !important;

    .control-btn {

      border-radius: 4px;
      padding: 6px 12px;
      font-family: 'Source Sans 3', sans-serif;

    /* Grid overlay */
    #page-grid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 500;
    }

    .page-grid-inner {

      flex-shrink: 0;

    /* #card, #card-inner, .art-image → engine.css */

    /* .package-label → .iphone-scroll-area → engine.css */

    /* admin-only: contenteditable highlight */

      color: #111111;

    .edit-pencil {

      right: 2px;

      border: 1px solid rgba(0,0,0,0.13);
      border-radius: 3px;
      width: 20px;
      height: 20px;
      font-size: 12px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;

      align-items: center;

    @keyframes spin { to { transform: rotate(360deg); } }
    .import-spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid rgba(0,0,0,0.15);
      border-top-color: #111;
      border-radius: 50%;

      vertical-align: middle;
      margin-right: 4px;
    }

    /* ── Dark mode ──────────────────────────────────────── */
    @keyframes newCardHighlightDark {

    }

    }
    /* Right panel */

    }

    }
    body.dark-mode .stack-header-pinned { background: #252525; }
    body.dark-mode .stack-header-collapse-btn { color: #555; }
    body.dark-mode .stack-header {
      background: #1e1e1e;
      border-bottom-color: #333;
    }
    body.dark-mode .stack-title { color: #666; }
    body.dark-mode .stack-item-label { color: #d0d0d0; }
    body.dark-mode .drag-handle { color: #555; }
    body.dark-mode .stack-action-btn {

    }

    }

    }
    body.dark-mode .accordion-header:hover { background: rgba(255,255,255,0.04); }
    body.dark-mode .panel-section { border-top-color: #2a2a2a; }

    body.dark-mode .control-label { color: #666; }
    body.dark-mode .control-input {
      background: #2a2a2a;

      margin-bottom: 8px;

    /* Remove button — prominent */
    #bn-remove-btn {
      width: 100%;
      padding: 9px 0;
      background: #fff;
      border: 1.5px solid #c00;
      border-radius: 3px;
      color: #c00;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #bn-remove-btn:hover { background: #c00; color: #fff; }

    /* Color swatches */
    .color-picker { display: flex; gap: 6px; }
    .color-swatch {
      flex: 1; height: 32px; border: none; border-radius: 3px;
      cursor: pointer; font-family: inherit; font-size: 11px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
      color: rgba(255,255,255,0.7);
      transition: box-shadow 0.15s, color 0.15s;
    }
    .color-swatch[data-color="red"]   { background: #b30000; }
    .color-swatch[data-color="black"] { background: #111; }
    .color-swatch:hover { color: #fff; }
    .color-swatch[data-color="red"].active   { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #b30000; color: #fff; }
    .color-swatch[data-color="black"].active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #555; color: #fff; }

    /* Duration grid */
    .duration-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }
    .dur-btn {
      padding: 6px 0;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .dur-btn:hover { background: #e8e8e8; color: #333; }
    .dur-btn.active { background: #5566ff; border-color: #5566ff; color: #fff; }

    /* Clear all link */
    #clear-all-row { margin-top: 9px; text-align: right; }
    #bn-clear-all {
      font-size: 11px;
      color: #bbb;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: color 0.1s, border-color 0.1s;
    }
    #bn-clear-all:hover { color: #888; border-bottom-color: #888; }

    /* Go Live button */
    #bn-publish-btn {
      width: 100%; padding: 8px 0;
      background: #b30000; border: none; border-radius: 3px;
      color: #fff; font-family: inherit; font-size: 12px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
      cursor: pointer; transition: background 0.15s;
    }
    #bn-publish-btn:hover:not(:disabled) { background: #cc0000; }
    #bn-publish-btn:disabled { background: #d9a0a0; color: rgba(255,255,255,0.65); cursor: not-allowed; }

    body.dark-mode .bn-stack-item.bn-live-closed > .accordion-header { background: rgba(179,0,0,0.2); }

    body.dark-mode #bn-remove-btn:hover { background: #c00; color: #fff; }

  <!-- Login view -->
  <div id="view-login" class="view">

            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Sign in with Google

      </div>

      <!-- Panel: Forgot password -->

      <div id="panel-reset" style="display:none">

  <script>
    const SUPABASE_URL  = 'https://lfwlzfdjwtnnhtejnlbn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxmd2x6ZmRqd3Rubmh0ZWpubGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDc4ODksImV4cCI6MjA5NDc4Mzg4OX0.jgr7Ipd3KBwE8IwX5uW8j9mtKt1yp3YPHMeNUmzVuF8';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const appState = {
      session: null,
      pages: [],

    };

    const listSort = { column: 'updated_at', direction: 'desc' };

    function showView(name) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + name).classList.add('active');
    }

    function renderProfilePanel() {
      const user = appState.session?.user;
      if (!user) return;
      const panel = document.getElementById('profile-panel');
      if (!panel) return;

      const provider = user.app_metadata?.provider || 'email';
      const avatarUrl = user.user_metadata?.avatar_url;
      const email = user.email || '';
      const displayName = user.user_metadata?.full_name || email;
      const initial = (displayName || '?')[0].toUpperCase();
      const created = new Date(user.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const lastSeen = new Date(user.last_sign_in_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });

      const providerLabel = provider === 'google' ? 'Google' : 'Email & password';
      const providerIcon = provider === 'google'
        ? `<svg width="13" height="13" viewBox="0 0 18 18" style="display:inline;vertical-align:middle" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>`
        : `<span class="material-symbols-outlined" style="font-size:13px;vertical-align:middle">mail</span>`;

      const avatarHtml = avatarUrl
        ? `<img class="profile-avatar" src="${escapeHtml(avatarUrl)}" alt="Avatar">`
        : `<div class="profile-avatar-initials">${escapeHtml(initial)}</div>`;

      panel.innerHTML = `
        ${avatarHtml}
        <div class="profile-name">${escapeHtml(displayName)}</div>
        <div class="profile-email">${escapeHtml(email)}</div>
        <div class="profile-divider"></div>
        <div class="profile-row">
          <span class="profile-row-label">Signed in via</span>
          <span class="profile-row-value" style="display:flex;align-items:center;gap:5px">${providerIcon}&nbsp;${providerLabel}</span>
        </div>
        <div class="profile-row">
          <span class="profile-row-label">Access level</span>
          <span class="profile-row-value">Full access</span>
        </div>
        <div class="profile-row">
          <span class="profile-row-label">Member since</span>
          <span class="profile-row-value">${created}</span>
        </div>
        <div class="profile-row">
          <span class="profile-row-label">Last sign-in</span>
          <span class="profile-row-value">${lastSeen}</span>
        </div>
        <button class="profile-signout-btn" id="panel-signout-btn">Sign out</button>
      `;

      document.getElementById('panel-signout-btn').addEventListener('click', () => sb.auth.signOut());
    }

    async function routeView() {
      const params = new URLSearchParams(window.location.search);
      const sharePageSlug = params.get('page');
      if (sharePageSlug) {
        if (appState.session) {
          await openPageBySlug(sharePageSlug); // authenticated: load the page directly
        } else {
          showView('login'); // not authenticated — require sign in first
        }
        return;
      }
      if (!appState.session) {
        showView('login');
        return;
      }
      showView('list');
      loadPages();
      const user = appState.session?.user;
      const displayName = user?.user_metadata?.full_name || user?.email || '';
      const identityEl = document.getElementById('list-identity');
      if (identityEl && displayName) {
        identityEl.innerHTML = `<span class="material-symbols-outlined">account_circle</span><span>${escapeHtml(displayName)}</span>`;
      }
      renderProfilePanel();
    }

    // ── Page list ──────────────────────────────────────

    async function loadPages() {
      const { data: pages, error } = await sb
        .from('pages')
        .select('id, name, slug, cards, width, mobile_preview_width, created_at, updated_at, owner_id, show_breaking_news, breaking_news_expires_at')
        .order('updated_at', { ascending: false });
      if (error) { console.error('loadPages:', error.message); return; }

      // Fetch display names for all owners
      const ownerIds = [...new Set((pages || []).map(p => p.owner_id).filter(Boolean))];
      let profileMap = {};
      if (ownerIds.length > 0) {
        const { data: profiles } = await sb.from('profiles').select('id, full_name').in('id', ownerIds);
        (profiles || []).forEach(p => { profileMap[p.id] = p.full_name; });
      }

      appState.pages = (pages || []).map(p => ({ ...p, ownerName: profileMap[p.owner_id] || null }));
      renderPageList();

      // Update identity display with real name from profiles
      const userId = appState.session?.user?.id;
      const fullName = profileMap[userId] || appState.session?.user?.user_metadata?.full_name || appState.session?.user?.email || '';
      const identityEl = document.getElementById('list-identity');
      if (identityEl && fullName) {
        identityEl.innerHTML = `<span class="material-symbols-outlined">account_circle</span><span>${escapeHtml(fullName)}</span>`;
      }
      renderProfilePanel();
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const date = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      return `${date}, ${time}`;
    }

    /* escapeHtml → engine.js */

    function slugify(name) {
      return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'page';
    }

    function sortedPages() {
      const { column, direction } = listSort;
      const mult = direction === 'asc' ? 1 : -1;
      return [...appState.pages].sort((a, b) => {
        let av = a[column] || '';
        let bv = b[column] || '';
        // Date columns: compare as timestamps
        if (column === 'created_at' || column === 'updated_at') {
          return (new Date(av) - new Date(bv)) * mult;
        }
        // String columns: case-insensitive
        return av.toLowerCase().localeCompare(bv.toLowerCase()) * mult;
      });
    }

    function renderPageList() {
      const grid = document.getElementById('pages-grid');
      if (appState.pages.length === 0) {
        grid.innerHTML = '<div class="list-empty">No pages yet. Click <strong>+ New Page</strong> to create your first one.</div>';
        return;
      }
      const userId = appState.session?.user?.id;

      const columns = [
        { label: 'Name',          key: 'name'       },
        { label: 'Created',       key: 'created_at' },
        { label: 'Last Modified', key: 'updated_at' },
        { label: 'Owner',         key: 'ownerName'  },
      ];

      const headerCells = columns.map(({ label, key }) => {
        const isActive = listSort.column === key;
        const arrow = isActive ? (listSort.direction === 'asc' ? '↑' : '↓') : '↕';
        return `<th class="sortable${isActive ? ' active' : ''}" data-col="${key}">${label}<span class="sort-arrow">${arrow}</span></th>`;
      }).join('') + '<th></th>';

      const rows = sortedPages().map(page => {
        const isOwner = userId === page.owner_id;
        const ownerDisplay = escapeHtml(page.ownerName || '—');
        return `
          <tr data-slug="${escapeHtml(page.slug)}" data-id="${page.id}">
            <td class="page-row-name">${escapeHtml(page.name)}</td>
            <td>${formatDate(page.created_at)}</td>
            <td>${formatDate(page.updated_at)}</td>
            <td>${ownerDisplay}</td>
            <td>
              <a class="page-row-preview-btn" href="page.html?page=${escapeHtml(page.slug)}" target="_blank" title="Preview page">Preview ↗</a>
              ${isOwner ? `<button class="page-row-dup-btn" data-slug="${escapeHtml(page.slug)}" data-name="${escapeHtml(page.name)}">Duplicate</button>` : ''}
              ${isOwner ? `<button class="page-row-delete-btn" data-id="${page.id}">Delete</button>` : ''}
            </td>
          </tr>`;
      }).join('');

      // FLIP — record positions before DOM update
      const beforeTops = {};
      grid.querySelectorAll('tbody tr[data-slug]').forEach(row => {
        beforeTops[row.dataset.slug] = row.getBoundingClientRect().top;
      });

      grid.innerHTML = `
        <table class="pages-table">
          <thead><tr>${headerCells}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;

      // FLIP — animate rows from where they were to where they are now
      grid.querySelectorAll('tbody tr[data-slug]').forEach(row => {
        const slug = row.dataset.slug;
        if (beforeTops[slug] === undefined) return;
        const delta = beforeTops[slug] - row.getBoundingClientRect().top;
        if (Math.abs(delta) < 1) return;
        row.style.transition = 'none';
        row.style.transform = `translateY(${delta}px)`;
        row.offsetHeight; // force reflow
        row.style.transition = 'transform 280ms ease';
        row.style.transform = 'translateY(0)';
      });

      grid.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.col;
          if (listSort.column === col) {
            listSort.direction = listSort.direction === 'asc' ? 'desc' : 'asc';
          } else {
            listSort.column = col;
            listSort.direction = 'asc';
          }
          renderPageList();
        });
      });

      grid.querySelectorAll('tbody tr').forEach(row => {
        row.addEventListener('click', e => {
          if (e.target.closest('.page-row-delete-btn') || e.target.closest('.page-row-preview-btn') || e.target.closest('.page-row-dup-btn')) return;
          openPageBySlug(row.dataset.slug);
        });
      });

      grid.querySelectorAll('.page-row-delete-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          deletePage(btn.dataset.id);
        });
      });

      grid.querySelectorAll('.page-row-dup-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          duplicatePage(btn.dataset.slug, btn.dataset.name);
        });
      });
    }

    async function createNewPage() {
      const name = prompt('Page name:');
      if (!name || !name.trim()) return;
      const slug = slugify(name.trim());
      // Check if slug is already taken
      const { data: existing } = await sb.from('pages').select('id').eq('slug', slug).maybeSingle();
      if (existing) {
        alert(`A page with the URL "?page=${slug}" already exists. Please choose a different name.`);
        return;
      }
      const { data, error } = await sb
        .from('pages')
        .insert({ name: name.trim(), slug, cards: [], owner_id: appState.session.user.id, width: '15u', mobile_preview_width: 390, masthead_url: '/logo-times-of-reston-trans.png', show_weather_bar: true })
        .select()
        .single();
      if (error) { alert('Could not create page: ' + error.message); return; }
      await loadPages();
      const newRow = document.querySelector(`#pages-grid tbody tr[data-slug="${slug}"]`);
      if (newRow) newRow.classList.add('page-row-new');
    }

    async function duplicatePage(sourceSlug, sourceName) {
      const defaultName = `${sourceName} – Copy`;
      const name = prompt('Name for the duplicate:', defaultName);
      if (!name || !name.trim()) return;

      const slug = slugify(name.trim());
      const { data: existing } = await sb.from('pages').select('id').eq('slug', slug).maybeSingle();
      if (existing) {
        alert(`A page with the URL "?page=${slug}" already exists. Please choose a different name.`);
        return;
      }

      // Fetch full source page (cards etc.)
      const { data: source, error: fetchErr } = await sb.from('pages').select('*').eq('slug', sourceSlug).single();
      if (fetchErr || !source) { alert('Could not load source page.'); return; }

      const { data, error } = await sb
        .from('pages')
        .insert({
          name:                name.trim(),
          slug,
          cards:               source.cards || [],
          width:               source.width || '15u',
          mobile_preview_width: source.mobile_preview_width || 390,
          owner_id:            appState.session.user.id,
        })
        .select()
        .single();
      if (error) { alert('Could not duplicate page: ' + error.message); return; }

      await loadPages();
      const newRow = document.querySelector(`#pages-grid tbody tr[data-slug="${slug}"]`);
      if (newRow) newRow.classList.add('page-row-new');
    }

    async function deletePage(id) {
      if (!confirm('Delete this page? This cannot be undone.')) return;
      const { error } = await sb.from('pages').delete().eq('id', id);
      if (error) { alert('Could not delete: ' + error.message); return; }
      appState.pages = appState.pages.filter(p => p.id !== id);
      renderPageList();
    }

    async function openPageBySlug(slug) {
      const { data, error } = await sb.from('pages').select('*').eq('slug', slug).single();
      if (error || !data) { alert('Page not found.'); return; }
      openPage(data);
    }

    // ── Undo stack ─────────────────────────────────────
    const _undoStack = [];
    const _undoMax = 50;
    let _saveTimer = null;
    let _bnCountdownTimer = null;

    function pushUndo() {
      if (!appState.currentPage) return;
      _undoStack.push(JSON.parse(JSON.stringify(appState.currentPage)));
      if (_undoStack.length > _undoMax) _undoStack.shift();
    }

    function scheduleSave() {
      appState.dirty = true;
      setSaveStatus('saving');
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(savePage, 1500);
    }

    function setSaveStatus(status) {
      const el = document.getElementById('save-status');
      if (!el) return;
      if (status === 'saving') {
        el.textContent = 'Saving…';
        el.className = 'save-status saving';
      } else if (status === 'saved') {
        el.textContent = 'Saved';
        el.className = 'save-status saved';
        setTimeout(() => { el.textContent = ''; el.className = 'save-status'; }, 2000);
      } else if (status === 'error') {
        el.textContent = 'Save failed';
        el.className = 'save-status error';
      } else {
        el.textContent = '';
        el.className = 'save-status';
      }
    }

    async function savePage() {
      if (!appState.session || !appState.currentPage) return;
      const { id, name, cards, width, mobilePreviewWidth, showPhoneFrame, mastheadUrl, showMasthead, showWeatherBar,
              showBreakingNews, breakingNewsLabel, breakingNewsText, breakingNewsUrl, breakingNewsColor,
              breakingNewsExpiresAt, breakingNewsPublishedAt, breakingNewsPublishedBy } = appState.currentPage;
      const { error } = await sb.from('pages').update({
        name,
        cards,
        width,
        mobile_preview_width: mobilePreviewWidth,
        show_phone_frame: showPhoneFrame,
        masthead_url: mastheadUrl || null,
        show_masthead: showMasthead !== false,
        show_weather_bar: showWeatherBar !== false,
        show_breaking_news: showBreakingNews || false,
        breaking_news_label: breakingNewsLabel || null,
        breaking_news_text: breakingNewsText || null,
        breaking_news_url: breakingNewsUrl || null,
        breaking_news_color: breakingNewsColor || 'red',
        breaking_news_expires_at: breakingNewsExpiresAt || null,
        breaking_news_published_at: breakingNewsPublishedAt || null,
        breaking_news_published_by: breakingNewsPublishedBy || null,
      }).eq('id', id);
      if (error) {
        console.error('Save failed:', error);
        setSaveStatus('error');
      } else {
        appState.dirty = false;
        setSaveStatus('saved');
      }
    }

    // ── Undo keyboard handler ──────────────────────────
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) {
        const active = document.activeElement;
        // Let text inputs handle their own undo (Phase E engine will use this)
        if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) return;
        if (!appState.currentPage || _undoStack.length === 0) return;
        e.preventDefault();
        const prev = _undoStack.pop();
        const prevIdx = appState.selectedCardIndex;
        appState.currentPage = prev;
        appState.selectedCardIndex = (prevIdx !== null && prevIdx < prev.cards.length) ? prevIdx : null;
        scheduleSave();
        renderEditorHeader();
        renderCardStack();
        renderAllCards();
        if (appState.selectedCardIndex === null) clearCardEditor();
      }
    });

    function openPage(page) {
      _undoStack.length = 0;
      clearTimeout(_saveTimer);
      _saveTimer = null;
      const cachedWidth = localStorage.getItem('nb-width-' + page.slug);
      const cachedMw    = localStorage.getItem('nb-mw-'    + page.slug);
      appState.currentPage = {
        ...page,
        cards: page.cards || [],
        width: cachedWidth || page.width || '15u',
        mobilePreviewWidth: cachedMw ? Number(cachedMw) : (page.mobile_preview_width || 390),
        showPhoneFrame: page.show_phone_frame !== false,
        showGrid: false,
        mastheadUrl: page.masthead_url || null,
        showMasthead: page.show_masthead !== false,
        showWeatherBar: page.show_weather_bar !== false,
        showBreakingNews: page.show_breaking_news || false,
        breakingNewsLabel: page.breaking_news_label || 'BREAKING NEWS',
        breakingNewsText: page.breaking_news_text || '',
        breakingNewsUrl: page.breaking_news_url || '',
        breakingNewsColor: page.breaking_news_color || 'red',
        breakingNewsExpiresAt: page.breaking_news_expires_at || null,
        breakingNewsPublishedAt: page.breaking_news_published_at || null,
        breakingNewsPublishedBy: page.breaking_news_published_by || null,
      };
      // Auto-expire: if bar has a timestamp that's already passed, clear it
      if (appState.currentPage.showBreakingNews && appState.currentPage.breakingNewsExpiresAt) {
        if (new Date(appState.currentPage.breakingNewsExpiresAt) < new Date()) {
          appState.currentPage.showBreakingNews = false;
          appState.currentPage.breakingNewsExpiresAt = null;
        }
      }
      appState.selectedCardIndex = null;
      appState.dirty = false;
      history.pushState({ pageSlug: page.slug }, '', `?page=${page.slug}`);
      showView('editor');
      renderEditorHeader();
      renderCardStack();
      renderMasthead();
      clearCardEditor();
    }

    // ── Masthead ───────────────────────────────────────

    function renderMasthead() {
      const el   = document.getElementById('masthead-placeholder');
      const wrap = document.getElementById('masthead-sticky-wrap');
      if (!el || !wrap) return;
      const page = appState.currentPage;
      const cardArea = document.getElementById('card-area');
      const isMobile = page && page.width === '1u';
      const shouldShowMasthead = page && page.mastheadUrl && page.showMasthead !== false;
      const bnAccordionOpen    = appState.selectedCardIndex === -2;
      const shouldShowBn       = page && (page.showBreakingNews || bnAccordionOpen);

      // On mobile both masthead and BN bar are rendered inside the phone scroll area
      if (isMobile) {
        wrap.style.display = 'none';
        if (cardArea) { cardArea.style.marginTop = ''; cardArea.style.paddingTop = ''; cardArea.style.borderTop = ''; }
        return;
      }

      // Nothing to show — hide wrapper and reset card area
      if (!shouldShowMasthead && !shouldShowBn) {
        wrap.style.display = 'none';
        el.innerHTML = '';
        el.style.display = '';
        if (cardArea) { cardArea.style.marginTop = ''; cardArea.style.paddingTop = ''; cardArea.style.borderTop = ''; }
        return;
      }

      wrap.style.display = '';

      // Render masthead image if enabled, otherwise hide the placeholder area
      if (shouldShowMasthead) {
        el.style.display = '';
        el.classList.toggle('masthead-selected', appState.selectedCardIndex === -1);
        el.innerHTML = `<img src="${escapeHtml(page.mastheadUrl)}" alt="Logo">`;
        if (page.showWeatherBar !== false) renderWeatherBar(el);
      } else {
        el.innerHTML = '';
        el.style.display = 'none';
      }

    // ── Card stack ─────────────────────────────────────

    let _dragSrcIdx = null;

    let _flipInProgress = false;

    // ── Pinned items (Masthead + Breaking News) ──────────────────────────────
    // Rendered into #pinned-stack-section, which is never rebuilt during card

    // ── Orderable cards ───────────────────────────────────────────────────────
    function renderCardStack() {
      const list = document.getElementById('card-stack-list');
      const cards = appState.currentPage?.cards || [];

      if (cards.length === 0) {
        list.innerHTML = '<div style="padding:16px 14px;font-size:13px;color:#555;">No cards yet.</div>';
        renderPinnedStack();
        return;
      }

      list.innerHTML = cards.map((card, i) => {
        const isOpen = i === appState.selectedCardIndex;
        const label = card.headline || card.headlinePlus || 'Untitled card';
        return `
          <div class="accordion-item${isOpen ? ' open' : ''}" data-index="${i}" draggable="true">
            <div class="accordion-header">
              <span class="drag-handle">⠿</span>
              <span class="stack-item-label" title="${escapeHtml(label)}">${escapeHtml(label)}</span>
              <div class="stack-item-actions">
                <button class="stack-action-btn" data-action="dup" data-index="${i}" title="Duplicate"><span class="material-symbols-outlined">content_copy</span></button>
                <button class="stack-action-btn remove" data-action="remove" data-index="${i}" title="Remove"><span class="material-symbols-outlined">delete</span></button>
              </div>
            </div>
            <div class="accordion-body-wrap">
              <div class="accordion-body-inner">
                ${isOpen ? '<div id="card-controls-section"></div>' : ''}
              </div>
            </div>
          </div>`;
      }).join('');

      renderPinnedStack();

      // Header click — select card or toggle open/close
      list.querySelectorAll('.accordion-item:not([data-masthead]):not([data-breaking-news]) .accordion-header').forEach(header => {
        header.addEventListener('click', e => {
          if (_importInProgress) return;
          if (e.target.closest('.stack-action-btn') || e.target.closest('.accordion-close-btn')) return;
          const item  = header.closest('.accordion-item');
          const index = Number(item.dataset.index);
          if (appState.selectedCardIndex === index && item.classList.contains('open')) {
            clearCardEditor();
          } else {
            selectCard(index);
          }
        });
      });

      // Action buttons
      list.querySelectorAll('.stack-action-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const idx = Number(btn.dataset.index);
          if (btn.dataset.action === 'dup') duplicateCard(idx);
          else if (btn.dataset.action === 'remove') removeCard(idx);
        });
      });

      // Drag to reorder (masthead item excluded — no draggable="true" attr)
      list.querySelectorAll('.accordion-item[draggable="true"]').forEach(item => {
        item.addEventListener('dragstart', e => {
          if (e.target.closest('.accordion-body-inner')) { e.preventDefault(); return; }
          if (item.classList.contains('open')) {
            // Use just the header as the drag ghost — compact and representative
            const header = item.querySelector('.accordion-header');
            if (header) {
              e.dataTransfer.setDragImage(header, e.offsetX, Math.min(e.offsetY, header.offsetHeight - 1));
            }
            // Skip the CSS transition so the list snaps shut instantly
            const bodyWrap = item.querySelector('.accordion-body-wrap');
            if (bodyWrap) { bodyWrap.style.transition = 'none'; bodyWrap.style.gridTemplateRows = '0fr'; }
            item.classList.remove('open');
            appState.selectedCardIndex = null;
          }
          _dragSrcIdx = Number(item.dataset.index);
          e.dataTransfer.effectAllowed = 'move';
          setTimeout(() => item.classList.add('dragging'), 0);
        });
        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          _dropIndicator.remove();
          if (!_flipInProgress) {
            list.querySelectorAll('.accordion-item').forEach(el => {
              el.style.transition = '';
              el.style.transform = '';
            });
          }
          _dragSrcIdx = null; _dropTargetIdx = null;
        });
        item.addEventListener('dragover', e => {
          if (_dragSrcIdx === null) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          const rect = item.getBoundingClientRect();
          const newTargetIdx = Number(item.dataset.index);
          const newDropBefore = e.clientY < rect.top + rect.height / 2;
          // Only animate if insertion point actually changed
          if (newTargetIdx === _dropTargetIdx && newDropBefore === _dropBefore) return;
          _dropTargetIdx = newTargetIdx;
          _dropBefore = newDropBefore;
          // FLIP: record positions before moving indicator
          const allItems = [...list.querySelectorAll('.accordion-item')];
          const beforeTops = allItems.map(el => el.getBoundingClientRect().top);
          // Move indicator
          list.insertBefore(_dropIndicator, _dropBefore ? item : item.nextSibling);
          // Apply inverted transforms
          allItems.forEach((el, i) => {
            if (el.classList.contains('dragging')) return;
            const diff = beforeTops[i] - el.getBoundingClientRect().top;
            if (Math.abs(diff) < 1) return;
            el.style.transition = 'none';
            el.style.transform = `translateY(${diff}px)`;
          });
          // Force reflow, then animate to natural positions
          list.offsetHeight;
          allItems.forEach(el => {
            if (el.classList.contains('dragging') || !el.style.transform) return;
            el.style.transition = 'transform 200ms ease';
            el.style.transform = 'translateY(0)';
          });
        });
      });

      list.addEventListener('dragover', e => e.preventDefault());
      list.addEventListener('dragleave', e => {
        if (!list.contains(e.relatedTarget)) {
          _dropIndicator.remove();
          list.querySelectorAll('.accordion-item').forEach(el => {
            el.style.transition = '';
            el.style.transform = '';
          });
          _dropTargetIdx = null;
        }
      });
      list.addEventListener('drop', e => {
        e.preventDefault();
        _dropIndicator.remove();
        if (_dragSrcIdx === null || _dropTargetIdx === null) return;
        let insertAt = _dropBefore ? _dropTargetIdx : _dropTargetIdx + 1;
        if (_dragSrcIdx < insertAt) insertAt--;
        if (insertAt === _dragSrcIdx) { _dragSrcIdx = null; _dropTargetIdx = null; return; }
        const cards = appState.currentPage.cards;
        const selectedCard = appState.selectedCardIndex !== null ? cards[appState.selectedCardIndex] : null;

        // Clear any ongoing dragover transforms before recording positions
        list.querySelectorAll('.accordion-item').forEach(el => {
          el.style.transition = 'none';
          el.style.transform = '';
        });
        list.offsetHeight;

        // FLIP — First: record each card's current Y position keyed by card object
        const oldTops = new Map();
        list.querySelectorAll('.accordion-item:not([data-masthead]):not([data-breaking-news])').forEach((el, i) => {
          oldTops.set(cards[i], el.getBoundingClientRect().top);
        });

        // Reorder data
        pushUndo();
        const [moved] = cards.splice(_dragSrcIdx, 1);
        cards.splice(insertAt, 0, moved);
        if (selectedCard) appState.selectedCardIndex = cards.indexOf(selectedCard);
        scheduleSave();
        _dragSrcIdx = null; _dropTargetIdx = null;
        const movedToIndex = insertAt;
        const dropY = e.clientY; // mouse position at moment of release

        // FLIP — Last: rebuild DOM at new positions
        renderCardStack();
        renderAllCards();
        if (appState.selectedCardIndex !== null) { buildPanel(); syncPresets(); }

        // FLIP — Invert + Play
        _flipInProgress = true;
        requestAnimationFrame(() => {
          const newEls = list.querySelectorAll('.accordion-item:not([data-masthead]):not([data-breaking-news])');
          const diffs = [];
          newEls.forEach((el, i) => {
            // Dragged card starts from mouse release point; others from their natural old positions
            const oldTop = i === movedToIndex ? dropY : oldTops.get(cards[i]);
            const diff = oldTop !== undefined ? oldTop - el.getBoundingClientRect().top : 0;
            diffs.push(diff);
            if (Math.abs(diff) >= 1) {
              el.style.transition = 'none';
              el.style.transform = `translateY(${diff}px)`;
            }
          });
          // Force reflow to commit inverted positions, then animate to natural positions
          list.offsetHeight;
          newEls.forEach((el, i) => {
            if (Math.abs(diffs[i]) >= 1) {
              el.style.transition = 'transform 620ms cubic-bezier(0.25, 0.46, 0.45, 0.94)';
              el.style.transform = 'translateY(0)';
            }
          });

          // Yellow highlight fires immediately — card glows as it slides into position
          const droppedEl = newEls[movedToIndex];
          if (droppedEl) {
            droppedEl.classList.add('accordion-item-dropped');
            setTimeout(() => droppedEl.classList.remove('accordion-item-dropped'), 2000);
          }

          // Scroll preview to dropped card and highlight it after scroll lands
          const previewEl = document.querySelector('.card-wrapper.selected, .phone-card-slot.selected')
            || document.querySelector(`.card-wrapper[data-index="${movedToIndex}"], .phone-card-slot[data-index="${movedToIndex}"]`);
          if (previewEl) {
            previewEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            let highlighted = false;
            const doHighlight = () => {
              if (highlighted) return;
              highlighted = true;
              previewEl.classList.add('card-drop-highlight');
              setTimeout(() => previewEl.classList.remove('card-drop-highlight'), 2000);
            };
            const obs = new IntersectionObserver((entries) => {
              if (entries[0].intersectionRatio >= 0.8) { obs.disconnect(); doHighlight(); }
            }, { threshold: 0.8 });
            obs.observe(previewEl);
            setTimeout(() => { obs.disconnect(); doHighlight(); }, 2500); // fallback
          }

          // Clear transforms and release the flip lock after animation completes
          setTimeout(() => {
            newEls.forEach(el => { el.style.transition = ''; el.style.transform = ''; });
            _flipInProgress = false;
          }, 640);
        });
      });
    }

    const _fillerHeadlines = [
      'Lorem Ipsum Leader Calls for Emergency Consectetur Summit',
      'Adipiscing Officials Deny Allegations Amid Growing Lorem Concerns',
      'Sed Do Eiusmod Nation Faces Uncertain Future, Experts Warn',
      'Consectetur Region Braces for Historic Tempor Incididunt Vote',
      'Lorem Ipsum Talks Collapse as Amet Delegates Walk Out',
      'Dolore Magna Aliqua Forces Advance on Ut Enim Capital',
    ];
    const _fillerSummaries = [
      'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.',
      'Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.',
      'Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.',
      'Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.',
      'Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium totam rem aperiam.',
      'Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit, sed quia consequuntur magni dolores.',
    ];
    function _randomFiller(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function addCard() {
      pushUndo();

      // Record existing card positions before DOM change
      // allItems[0] = old first card, allItems[1] = old second card, etc.
      const list = document.getElementById('card-stack-list');
      const beforeTops = [...list.querySelectorAll('.accordion-item')].map(el => el.getBoundingClientRect().top);

      // Insert new card at top with filler text and a unique random image
      const seed = Math.random().toString(36).slice(2, 9);
      appState.currentPage.cards.unshift({
        imageUrl: `https://picsum.photos/seed/${seed}/628/419`,
        headline: _randomFiller(_fillerHeadlines),
        blurb:    _randomFiller(_fillerSummaries),
      });

      // Shift selected index so the currently open card stays open
      if (appState.selectedCardIndex !== null && appState.selectedCardIndex >= 0) {
        appState.selectedCardIndex += 1;
      }

      scheduleSave();
      renderAllCards();
      renderCardStack();

      // FLIP: animate existing cards sliding down to their new positions.
      // After renderCardStack(), DOM order is: [newCard(0), oldCard0(1), oldCard1(2)…]
      // beforeTops order was:                  [oldCard0(0), oldCard1(1)…]
      // So for i≥1: old position = beforeTops[i-1] (maps new DOM index back to old DOM index).
      const allItems = [...list.querySelectorAll('.accordion-item')];
      allItems.forEach((el, i) => {
        if (i === 0) return; // skip new card
        const oldTop = beforeTops[i - 1];
        if (oldTop === undefined) return;
        const delta = oldTop - el.getBoundingClientRect().top;
        if (Math.abs(delta) < 1) return;
        el.style.transition = 'none';
        el.style.transform = `translateY(${delta}px)`;
        el.offsetHeight; // force reflow
        el.style.transition = 'transform 350ms ease';
        el.style.transform = 'translateY(0)';
      });

      // Flash-highlight the new card in the right panel
      if (allItems[0]) allItems[0].classList.add('accordion-item-new');

      // Scroll preview to new card + glow highlight in left preview area
      const cardArea = document.getElementById('card-area');
      if (cardArea) {
        const previewEl = cardArea.querySelector('.card-wrapper[data-index="0"], .phone-card-slot[data-index="0"]');
        if (previewEl) {
          previewEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          previewEl.classList.add('card-drop-highlight');
          setTimeout(() => previewEl.classList.remove('card-drop-highlight'), 2000);
        }
      }
    }

    function moveCard(index, direction) {
      const cards = appState.currentPage.cards;
      const target = index + direction;
      if (target < 0 || target >= cards.length) return;
      pushUndo();
      [cards[index], cards[target]] = [cards[target], cards[index]];
      if (appState.selectedCardIndex === index) appState.selectedCardIndex = target;
      else if (appState.selectedCardIndex === target) appState.selectedCardIndex = index;
      scheduleSave();
      renderCardStack();
    }

    function duplicateCard(index) {
      pushUndo();
      const cards    = appState.currentPage.cards;
      const list     = document.getElementById('card-stack-list');
      const cardArea = document.getElementById('card-area');
      const newIndex = index + 1;

      // ── 1. Snapshot positions of items that will shift down ───────
      const oldAccordionTops = new Map();
      if (list) {
        list.querySelectorAll('.accordion-item').forEach(el => {
          const i = Number(el.dataset.index);
          if (i > index) oldAccordionTops.set(i, el.getBoundingClientRect().top);
        });
      }
      const oldPreviewTops = new Map();
      if (cardArea) {
        cardArea.querySelectorAll('.card-wrapper[data-index], .phone-card-slot[data-index]').forEach(el => {
          const i = Number(el.dataset.index);
          if (i > index) oldPreviewTops.set(i, el.getBoundingClientRect().top);
        });
      }

      // ── 2. Mutate state, rebuild DOM ──────────────────────────────
      const copy = JSON.parse(JSON.stringify(cards[index]));
      cards.splice(newIndex, 0, copy);
      scheduleSave();
      if (appState.selectedCardIndex !== null && appState.selectedCardIndex > index) {
        appState.selectedCardIndex++;
      }
      renderAllCards();
      renderCardStack();
      if (appState.selectedCardIndex !== null) { buildPanel(); syncPresets(); }

      // ── 3. FLIP shifted items + highlight new card ────────────────
      requestAnimationFrame(() => {
        [
          { els: list     ? Array.from(list.querySelectorAll('.accordion-item')) : [],                                        tops: oldAccordionTops },
          { els: cardArea ? Array.from(cardArea.querySelectorAll('.card-wrapper[data-index], .phone-card-slot[data-index]')) : [], tops: oldPreviewTops }
        ].forEach(({ els, tops }) => {
          const diffs = els.map(el => {
            const newIdx = Number(el.dataset.index);
            if (newIdx === newIndex) return 0; // new card — no FLIP, just highlight
            const oldIdx = newIdx > newIndex ? newIdx - 1 : newIdx;
            const oldTop = tops.get(oldIdx);
            const diff   = oldTop !== undefined ? oldTop - el.getBoundingClientRect().top : 0;
            if (Math.abs(diff) >= 1) {
              el.style.transition = 'none';
              el.style.transform  = `translateY(${diff}px)`;
            }
            return diff;
          });

          if (els.length) els[0].offsetHeight; // force reflow

          els.forEach((el, i) => {
            if (Math.abs(diffs[i]) >= 1) {
              el.style.transition = 'transform 620ms cubic-bezier(0.25, 0.46, 0.45, 0.94)';
              el.style.transform  = 'translateY(0)';
            }
          });

          setTimeout(() => {
            els.forEach(el => { el.style.transition = ''; el.style.transform = ''; });
          }, 640);
        });

        // Yellow highlight on the new accordion item
        const newItem = list ? list.querySelector(`.accordion-item[data-index="${newIndex}"]`) : null;
        if (newItem) {
          newItem.classList.add('accordion-item-new');
          setTimeout(() => newItem.classList.remove('accordion-item-new'), 3500);
        }

        // Scroll preview to new card + glow highlight
        const previewEl = cardArea
          ? cardArea.querySelector(`.card-wrapper[data-index="${newIndex}"], .phone-card-slot[data-index="${newIndex}"]`)
          : null;
        if (previewEl) {
          previewEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          previewEl.classList.add('card-drop-highlight');
          setTimeout(() => previewEl.classList.remove('card-drop-highlight'), 2000);
        }
      });
    }

    function removeCard(index) {
      if (!confirm('Remove this card?')) return;

      const cards  = appState.currentPage.cards;
      const list   = document.getElementById('card-stack-list');
      const cardArea = document.getElementById('card-area');

      // ── 1. Snapshot positions of cards that will remain ──────────
      const oldAccordionTops = new Map();
      if (list) {
        list.querySelectorAll('.accordion-item').forEach(el => {
          const i = Number(el.dataset.index);
          if (i !== index) oldAccordionTops.set(i, el.getBoundingClientRect().top);
        });
      }
      const oldPreviewTops = new Map();
      if (cardArea) {
        cardArea.querySelectorAll('.card-wrapper[data-index], .phone-card-slot[data-index]').forEach(el => {
          const i = Number(el.dataset.index);
          if (i !== index) oldPreviewTops.set(i, el.getBoundingClientRect().top);
        });
      }

      // ── 2. Fade out the target accordion item ────────────────────
      const itemToFade = list ? list.querySelector(`.accordion-item[data-index="${index}"]`) : null;
      if (itemToFade) {
        itemToFade.style.transition = 'opacity 360ms ease';
        itemToFade.style.opacity = '0';
        itemToFade.style.pointerEvents = 'none';
      }

      // ── 3. After fade: mutate state, rebuild DOM ──────────────────
      setTimeout(() => {
        pushUndo();
        cards.splice(index, 1);
        scheduleSave();

        // Adjust selectedCardIndex
        if (cards.length === 0) {
          appState.selectedCardIndex = null;
        } else if (appState.selectedCardIndex === index) {
          // Keep pointing at same slot (next card slides in); clamp if last
          if (appState.selectedCardIndex >= cards.length) {
            appState.selectedCardIndex = cards.length - 1;
          }
        } else if (appState.selectedCardIndex !== null && appState.selectedCardIndex > index) {
          appState.selectedCardIndex -= 1;
        }

        if (cards.length === 0) {
          clearCardEditor();
          renderAllCards();
          renderCardStack();
          return;
        }
        renderAllCards();
        renderCardStack();
        if (appState.selectedCardIndex !== null) { buildPanel(); syncPresets(); }

        // ── 4. FLIP remaining items ───────────────────────────────
        requestAnimationFrame(() => {
          [
            { els: list     ? Array.from(list.querySelectorAll('.accordion-item')) : [],                                        tops: oldAccordionTops },
            { els: cardArea ? Array.from(cardArea.querySelectorAll('.card-wrapper[data-index], .phone-card-slot[data-index]')) : [], tops: oldPreviewTops }
          ].forEach(({ els, tops }) => {
            const diffs = els.map(el => {
              const newIdx = Number(el.dataset.index);
              const oldIdx = newIdx >= index ? newIdx + 1 : newIdx;
              const oldTop = tops.get(oldIdx);
              const diff   = oldTop !== undefined ? oldTop - el.getBoundingClientRect().top : 0;
              if (Math.abs(diff) >= 1) {
                el.style.transition = 'none';
                el.style.transform  = `translateY(${diff}px)`;
              }
              return diff;
            });

            if (els.length) els[0].offsetHeight; // force reflow

            els.forEach((el, i) => {
              if (Math.abs(diffs[i]) >= 1) {
                el.style.transition = 'transform 620ms cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                el.style.transform  = 'translateY(0)';
              }
            });

            setTimeout(() => {
              els.forEach(el => { el.style.transition = ''; el.style.transform = ''; });
            }, 640);
          });
        });
      }, 380);
    }

    function renderAllCards() {
      const cardArea = document.getElementById('card-area');

      // Lock the scroll container's height during the re-render so the scroll
      // position can't change, which would fire a scroll event that toggles
      // .stuck on the masthead and triggers its CSS transition (causing a jump).
      const _prevH = cardArea.offsetHeight;
      if (_prevH > 0) cardArea.style.minHeight = _prevH + 'px';

      const cards = appState.currentPage?.cards || [];
      const pageWidth = appState.currentPage?.width || '15u';
      const mobilePx = appState.currentPage?.mobilePreviewWidth || 390;
      const showPhoneFrame = appState.currentPage?.showPhoneFrame !== false;
      const deviceHeights = { 320: 568, 375: 812, 390: 844, 430: 932 };

      if (cards.length === 0) {
        _renderTarget = null;
        cardArea.innerHTML = '<div class="card-area-placeholder">Add a card to get started</div>';
        cardArea.style.minHeight = '';
        renderPageGrid();
        return;
      }

      if (pageWidth === '1u') {
        // ── Mobile: one phone frame (or bare stack), all cards inside ──
        const screenH = deviceHeights[mobilePx] || 844;
        if (showPhoneFrame) {
          cardArea.innerHTML = `
            <div class="iphone-frame">
              <div class="iphone-screen" style="height:${screenH}px; overflow:hidden;">
                <div class="iphone-island"></div>
                <div class="iphone-statusbar">
                  <span class="iphone-statusbar-time">9:41</span>
                  <div class="iphone-statusbar-icons">
                    <svg width="17" height="12" viewBox="0 0 17 12" fill="#111"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
                    <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="#111" stroke-linecap="round"><circle cx="8" cy="11.5" r="1" fill="#111" stroke="none"/><path d="M4.8 8.2a4.5 4.5 0 0 1 6.4 0" stroke-width="1.5"/><path d="M1.5 4.8a9 9 0 0 1 13 0" stroke-width="1.5"/></svg>
                    <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.75" y="0.75" width="20.5" height="10.5" rx="3.25" stroke="#111" stroke-width="1.5" stroke-opacity="0.4"/><rect x="2.5" y="2.5" width="15" height="7" rx="1.5" fill="#111"/><path d="M22.5 4.5v3" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/></svg>
                  </div>
                </div>
                <div class="iphone-scroll-area" id="nb-phone-scroll" style="overflow-y:auto; flex:1;"></div>
                <div class="iphone-home"></div>
              </div>
            </div>`;
        } else {
          cardArea.innerHTML = `<div id="nb-phone-scroll" style="width:${mobilePx}px;"></div>`;
        }

        const scrollArea = document.getElementById('nb-phone-scroll');

        const page = appState.currentPage;

        // Inject masthead at top of scroll area if set and visible
        if (page && page.mastheadUrl && page.showMasthead !== false) {
          const mastheadDiv = document.createElement('div');
          const maxW = Math.round(mobilePx * 0.55);
          mastheadDiv.style.cssText = `background:#fff;padding:20px 16px 16px;width:${mobilePx}px;`;
          mastheadDiv.innerHTML = `<img src="${escapeHtml(page.mastheadUrl)}" alt="Masthead" style="max-width:${maxW}px;width:100%;height:auto;display:block;margin:0 auto;">`;
          scrollArea.appendChild(mastheadDiv);
        }

        // Inject breaking news bar — independent of masthead visibility
        if (page) {
          const bnMobileOpen = appState.selectedCardIndex === -2;
          if (page.showBreakingNews || bnMobileOpen) {
            renderBreakingNewsBar(scrollArea, {
              label:     page.breakingNewsLabel  || 'BREAKING NEWS',
              text:      page.breakingNewsText   || '',
              url:       page.breakingNewsUrl    || '',
              color:     page.breakingNewsColor  || 'red',
              expiresAt: page.showBreakingNews ? (page.breakingNewsExpiresAt || null) : null,
              dismissKey: null,
              animate:   false,
            });
            // Constrain bar to phone width and apply mobile-friendly layout
            const bnBar = document.getElementById('breaking-news-bar');
            if (bnBar) {
              bnBar.style.width = mobilePx + 'px';
              bnBar.style.boxSizing = 'border-box';
              bnBar.classList.add('bn-mobile');
            }
          }
        }

        const slots = [];

        _suppressSync = true;
        _contentOnly = true;
        cards.forEach((card, i) => {
          const isSelected = i === appState.selectedCardIndex;
          const slot = document.createElement('div');
          slot.className = 'phone-card-slot' + (isSelected ? ' selected' : '');
          slot.dataset.index = i;
          scrollArea.appendChild(slot);
          slots.push(slot);

          Object.assign(state, JSON.parse(JSON.stringify(defaultState)));
          Object.assign(state, card || {});
          state.width = '1u';
          state.mobilePresetWidth = mobilePx;
          _renderTarget = slot;
          render();

          if (!isSelected) {
            const overlay = document.createElement('div');
            overlay.className = 'card-select-overlay';
            overlay.dataset.index = i;
            overlay.addEventListener('click', () => selectCard(Number(overlay.dataset.index)));
            slot.appendChild(overlay);
          }
        });
        _contentOnly = false;
        _suppressSync = false;

        // Leave state + _renderTarget on selected card's slot
        if (appState.selectedCardIndex !== null && appState.selectedCardIndex < cards.length) {
          Object.assign(state, JSON.parse(JSON.stringify(defaultState)));
          Object.assign(state, cards[appState.selectedCardIndex] || {});
          state.width = '1u';
          state.mobilePresetWidth = mobilePx;
          _renderTarget = slots[appState.selectedCardIndex];
        } else {
          _renderTarget = null;
        }

      } else {
        // ── Desktop: one wrapper per card ──────────────────────
        cardArea.innerHTML = '';
        const wrappers = cards.map((card, i) => {
          const isSelected = i === appState.selectedCardIndex;
          const div = document.createElement('div');
          div.className = 'card-wrapper' + (isSelected ? ' selected' : '');
          div.dataset.index = i;
          cardArea.appendChild(div);
          return div;
        });

        _suppressSync = true;
        cards.forEach((card, i) => {
          const isSelected = i === appState.selectedCardIndex;
          Object.assign(state, JSON.parse(JSON.stringify(defaultState)));
          Object.assign(state, card || {});
          state.width = pageWidth;
          state.mobilePresetWidth = mobilePx;
          _renderTarget = wrappers[i];
          render();
          if (!isSelected) {
            const overlay = document.createElement('div');
            overlay.className = 'card-select-overlay';
            overlay.dataset.index = i;
            overlay.addEventListener('click', () => selectCard(Number(overlay.dataset.index)));
            wrappers[i].appendChild(overlay);
          }
        });
        _suppressSync = false;

        if (appState.selectedCardIndex !== null && appState.selectedCardIndex < cards.length) {
          Object.assign(state, JSON.parse(JSON.stringify(defaultState)));
          Object.assign(state, cards[appState.selectedCardIndex] || {});
          state.width = pageWidth;
          state.mobilePresetWidth = mobilePx;
          _renderTarget = wrappers[appState.selectedCardIndex];
        } else {
          _renderTarget = null;
        }
      }

      cardArea.style.minHeight = '';
      renderPageGrid();
    }

      if (appState.selectedCardIndex === -1) buildMastheadPanel();
