<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="engine.css">
  <script src="engine.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: #ffffff;
      color: #111;
      min-height: 100vh;
    }

    /* ── Page chrome ── */
    #page-header {
      background: #111;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #page-header h1 {
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #masthead-area {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background: #fff;
      display: flex;
      justify-content: center;
      padding: 28px 24px 24px;
      border-bottom: 1px solid transparent;
      transition: padding 0.35s ease, border-color 0.35s ease;
    }
    #masthead-area.stuck {
      padding: 10px 24px;
      border-bottom-color: #e0e0e0;
    }
    #masthead-area img {
      max-width: 440px;
      width: 100%;
      height: auto;
      display: block;
      transition: max-width 0.35s ease;
    }
    #masthead-area.stuck img {
      max-width: 200px;
    }
    @media (max-width: 709px) {
      #masthead-area {
        padding: 20px 16px 16px;
      }
      #masthead-area.stuck {
        padding: 8px 16px;
      }
      #masthead-area img {
        max-width: 55%;
      }
      #masthead-area.stuck img {
        max-width: 30%;
      }
    }

    #page-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0 80px;
      gap: 0;
    }

    .card-wrapper + .card-wrapper {
      margin-top: 40px;
      padding-top: 40px;
      border-top: 1px solid #e0e0e0;
    }

    .card-wrapper { position: relative; z-index: 2; }
    #masthead-area { position: sticky; z-index: 10; }
    #page-container { position: relative; z-index: 2; }

    #full-page-grid {
      position: fixed;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 50;
    }
    .page-grid-inner {
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
    }
    .grid-col { flex-shrink: 0; width: 34px; background: rgba(180,160,220,0.22); }
    .grid-col-fluid { flex: 1; background: rgba(180,160,220,0.22); }
    .grid-gutter { flex-shrink: 0; width: 32px; }
    .grid-margin { flex-shrink: 0; width: 16px; }

    #grid-toggle-btn {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 1000;
      height: 22px;
      padding: 0 8px;
      background: rgba(0,0,0,0.32);
      border: none;
      border-radius: 3px;
      color: rgba(255,255,255,0.55);
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #grid-toggle-btn:hover { background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.85); }
    #grid-toggle-btn.active { background: rgba(85,102,255,0.8); color: #fff; }

    #status {
      padding: 80px 24px;
      text-align: center;
      font-size: 16px;
      color: #888;
    }

    #page-footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #aaa;
      letter-spacing: 0.02em;
    }

    /* .supporting-headline → .iphone-scroll-area → engine.css */

    /* page-only: #card box-sizing override */
    #card { box-sizing: border-box; }

    /* page-only: hover states */
    .supporting-headline:hover { color: #888; }
    .headline:hover { color: #888; }

    /* page-only: hide editor pencil */
    .edit-pencil { display: none !important; }
  </style>
</head>
<body>
  <div id="page-header"><h1 id="page-title">Preview</h1></div>
  <button id="grid-toggle-btn">Grid</button>
  <div id="masthead-area" style="display:none;"></div>
  <div id="page-container">
    <div id="status">Loading…</div>
  </div>
  <footer id="page-footer">Built by Ben Rubenstein using Claude Code.</footer>

  <script>
    const SUPABASE_URL  = 'https://lfwlzfdjwtnnhtejnlbn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxmd2x6ZmRqd3Rubmh0ZWpubGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMDc4ODksImV4cCI6MjA5NDc4Mzg4OX0.jgr7Ipd3KBwE8IwX5uW8j9mtKt1yp3YPHMeNUmzVuF8';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* ── Story Card Engine ── */

    const state = {
      headline: 'Lead headline goes here. The ideal length is between 50 and 100 characters.',
      blurb: 'Lead blurb here is the blurb text. Blurbs appear with the lead story only. Lead blurb here is the blurb text. Blurbs appear with the lead story only.',
      imageUrl: '',
      caption: '',
      width: '15u',
      mobilePresetWidth: 390,
      phoneClip: true,
      leadPlus: 0,
      showPackageLabel: false,
      packageLabelText: 'Label Text',
      showLive: false,
      showKicker: false,
      kickerSection: 'Analysis',
      kickerAuthor: 'Jennifer Rubin',
      showHeadline: true,
      showBlurb: true,
      showTicker: false,
      tickerItems: [
        { time: '2:47 p.m.', text: 'Harris leads Trump by six points in new post-debate poll, according to a Washington Post–ABC News survey...' },
        { time: '2:31 p.m.', text: 'When Biden announced he would not seek reelection, his closest allies scrambled to understand what the decision...' },
        { time: '2:18 p.m.', text: 'Senate Democrats are pushing for an emergency session to address the latest developments...' },
      ],
      aspectRatio: '3/2',
      portrait: false,
      showOverlayButton: false,
      overlayButtonLabel: 'Play Video',
      showOverlayDuration: true,
      supportingHeadlines: ['', '', '', ''],
      supportingUrls: ['', '', '', ''],
      lastImportedSection: null,
      articleUrl: '',
    };

    const defaultState = JSON.parse(JSON.stringify(state));

    let importingText = false;
    let importingImage = false;
    let _renderTarget = null;
    let _suppressSync = true;   // always read-only in preview
    let _contentOnly = false;

    // No-ops for preview
    function attachInlineEditors() {}
    function _syncCardStateBack() {}
    function stateToHash() {}
    function hashToState() {}

    const widthConfig = {
      '1u':  { cardWidth: null,    maxWidth: '767px', flexDir: 'column', gap: '12px', textFlex: '1 1 auto', artFlex: '1 1 auto', tileWidth: null, carouselTileWidth: null },
      '10u': { cardWidth: '660px', maxWidth: null,    flexDir: 'row',    gap: '32px', textFlex: '0 0 298px', artFlex: '0 0 298px', tileWidth: 188,  carouselTileWidth: 232 },
      '12u': { cardWidth: '792px', maxWidth: null,    flexDir: 'row',    gap: '32px', textFlex: '0 0 232px', artFlex: '0 0 496px', tileWidth: 232,  carouselTileWidth: 200 },
      '15u': { cardWidth: '990px', maxWidth: null,    flexDir: 'row',    gap: '32px', textFlex: '0 0 298px', artFlex: '0 0 628px', tileWidth: 298,  carouselTileWidth: 232 },
    };

    const deviceHeights = { 320: 568, 375: 812, 390: 844, 430: 932 };

    function render() {
      const cfg = widthConfig[state.width];
      const cardStyle = state.width === '1u'
        ? `width:${state.mobilePresetWidth}px;padding:0 16px`
        : `width:${parseInt(cfg.cardWidth) - 32}px`;

      const sh = (i) => {
        const text = state.supportingHeadlines[i] || 'Supporting headline text goes here lorem ipsum dolor sit amet';
        const url = state.supportingUrls && state.supportingUrls[i];
        return url ? `<a href="${url}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;">${text}</a>` : text;
      };
      const vDivider = `<div style="flex:0 0 32px;align-self:stretch;position:relative;"><div style="position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:1px;background:rgba(0,0,0,0.1)"></div></div>`;
      const t1uCard = (item, borderRadius, isLast) => `
        <div style="flex-shrink:0;padding:16px 20px;border:1px solid rgba(0,0,0,0.1);background:white;border-radius:${borderRadius};${!isLast ? 'margin-right:-1px;' : ''}display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;align-items:center;gap:4px;">
            <div style="width:6px;height:6px;background:#ea0017;border-radius:50%;flex-shrink:0;"></div>
            <p style="font-family:'Source Sans 3',sans-serif;font-weight:400;font-size:12px;line-height:15px;color:#ea0017;white-space:nowrap;">${item.time || '1:00 p.m.'}</p>
          </div>
          <p style="font-family:'Source Sans 3',sans-serif;font-weight:400;font-size:14px;line-height:17.5px;color:#111;width:208px;overflow:hidden;text-overflow:ellipsis;">${item.text || 'Update text goes here'}</p>
        </div>
      `;

      const cardHTML = `
        <div id="card" style="${cardStyle}">
          ${state.showPackageLabel ? `
            <div class="package-label">
              <span class="package-label-text">${state.packageLabelText}</span>
              <span class="package-label-chevron">›</span>
            </div>
          ` : ''}
          <div id="card-inner" style="flex-direction:${cfg.flexDir};gap:${cfg.gap}">
            <div id="text-col" style="flex:${cfg.textFlex}">
              ${state.showKicker ? `<p class="kicker-label">${state.kickerSection}</p>` : ''}
              ${state.showLive ? `<div class="live-label"><span>LIVE</span></div>` : ''}
              ${state.showHeadline ? (importingText ? `<div class="card-skeleton" style="height:26px;margin-bottom:5px;"></div><div class="card-skeleton" style="height:26px;width:68%;"></div>` : `<div class="editable-wrap" data-field="headline"><button class="edit-pencil" title="Edit headline">✎</button>${state.articleUrl ? `<a href="${state.articleUrl}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;display:block;">` : ''}<p class="headline">${state.headline}</p>${state.articleUrl ? `</a>` : ''}</div>`) : ''}
              ${importingText && state.showBlurb ? `<div style="margin-top:8px;display:flex;flex-direction:column;gap:5px;"><div class="card-skeleton" style="height:15px;"></div><div class="card-skeleton" style="height:15px;"></div><div class="card-skeleton" style="height:15px;width:60%;"></div></div>` : state.showTicker && state.width !== '1u' && state.showBlurb ? `
                <div class="ticker-container">
                  <p class="ticker-live-header">LIVE</p>
                  <div class="ticker-item">
                    <div class="ticker-gutter"><div class="ticker-dot"></div><div class="ticker-line"></div></div>
                    <div class="ticker-content"><p class="ticker-time">${state.tickerItems[0].time || '1:00 p.m.'}</p><p class="ticker-text">${state.tickerItems[0].text || 'Update text goes here'}</p></div>
                  </div>
                  <div class="ticker-item">
                    <div class="ticker-gutter"><div class="ticker-dot"></div><div class="ticker-line"></div></div>
                    <div class="ticker-content"><p class="ticker-time">${state.tickerItems[1].time || '1:00 p.m.'}</p><p class="ticker-text">${state.tickerItems[1].text || 'Update text goes here'}</p></div>
                  </div>
                  <div class="ticker-item">
                    <div class="ticker-gutter"><div class="ticker-dot"></div></div>
                    <div class="ticker-content ticker-content--last"><p class="ticker-time">${state.tickerItems[2].time || '1:00 p.m.'}</p><p class="ticker-text">${state.tickerItems[2].text || 'Update text goes here'}</p></div>
                  </div>
                </div>
              ` : (!state.showTicker && state.showBlurb ? `<div class="editable-wrap" data-field="blurb"><button class="edit-pencil" title="Edit blurb">✎</button><p class="blurb">${state.blurb}</p></div>` : '')}
              ${state.leadPlus >= 1 && state.leadPlus < 3 && (state.width === '12u' || state.width === '15u') ? `
                <hr class="h-rule">
                <p class="supporting-headline">${sh(0)}</p>
              ` : ''}
              ${state.leadPlus === 2 && (state.width === '12u' || state.width === '15u') ? `
                <hr class="h-rule">
                <p class="supporting-headline">${sh(1)}</p>
              ` : ''}
            </div>
            <div id="art-col" style="flex:${cfg.artFlex}">
              <div class="art-wrapper">
                ${state.articleUrl ? `<a href="${state.articleUrl}" target="_blank" rel="noopener" style="display:block;line-height:0;">` : ''}
                ${importingImage ? `<div class="card-skeleton art-image" style="aspect-ratio:${(() => { const [w,h] = state.aspectRatio.split('/'); return state.portrait ? h+'/'+w : w+'/'+h; })()};"></div>` : `<img class="art-image" src="${state.imageUrl}" alt="" onerror="this.onerror=null;this.src='https://picsum.photos/seed/wapo/628/419'" style="aspect-ratio:${(() => { const [w,h] = state.aspectRatio.split('/'); return state.portrait ? h+'/'+w : w+'/'+h; })()};${state.articleUrl ? 'cursor:pointer;' : ''}">`}
                ${state.showOverlayButton ? `
                  <div class="art-overlay-btn">
                    <svg width="10" height="12" viewBox="0 0 10 12" fill="white" style="flex-shrink:0"><path d="M0 0 L10 6 L0 12 Z"/></svg>
                    <span class="overlay-label">${state.overlayButtonLabel}</span>${state.showOverlayDuration ? `<span class="overlay-duration"> 2:12</span>` : ''}
                  </div>
                ` : ''}
                ${state.articleUrl ? `</a>` : ''}
              </div>
              <div class="editable-wrap" data-field="caption"><button class="edit-pencil" title="Edit caption">✎</button><p class="caption">${state.caption}</p></div>
            </div>
          </div>
          ${state.showTicker && state.width === '1u' ? `
            <div style="overflow-x:auto;padding-top:16px;">
              <div style="display:flex;">
                ${t1uCard(state.tickerItems[0], '6px 0 0 6px', false)}
                ${t1uCard(state.tickerItems[1], '0', false)}
                ${t1uCard(state.tickerItems[2], '0 6px 6px 0', true)}
              </div>
            </div>
          ` : ''}
          ${state.leadPlus >= 1 && state.width === '1u' ? `<hr class="h-rule"><p class="supporting-headline">${sh(0)}</p>` : ''}
          ${state.leadPlus >= 2 && state.width === '1u' ? `<hr class="h-rule"><p class="supporting-headline">${sh(1)}</p>` : ''}
          ${state.leadPlus === 3 && state.width === '1u' ? `<hr class="h-rule"><p class="supporting-headline">${sh(2)}</p>` : ''}
          ${state.leadPlus >= 4 && state.width === '1u' ? `
            <hr class="h-rule">
            <div style="display:flex;overflow-x:auto;">
              <p class="supporting-headline" style="flex:0 0 ${Math.floor((state.mobilePresetWidth - 32) * 0.75)}px">${sh(2)}</p>
              ${vDivider}
              <p class="supporting-headline" style="flex:0 0 ${Math.floor((state.mobilePresetWidth - 32) * 0.75)}px">${sh(3)}</p>
            </div>
          ` : ''}
          ${state.leadPlus === 3 && (state.width === '12u' || state.width === '15u') ? `
            <hr class="h-rule">
            <div style="display:flex;align-items:flex-start;">
              <p class="supporting-headline" style="flex:1">${sh(0)}</p>
              ${vDivider}
              <p class="supporting-headline" style="flex:1">${sh(1)}</p>
              ${vDivider}
              <p class="supporting-headline" style="flex:1">${sh(2)}</p>
            </div>
          ` : ''}
          ${state.leadPlus === 1 && state.width === '10u' ? `<hr class="h-rule"><p class="supporting-headline">${sh(0)}</p>` : ''}
          ${state.leadPlus === 2 && state.width === '10u' ? `<hr class="h-rule"><p class="supporting-headline">${sh(0)}</p><hr class="h-rule"><p class="supporting-headline">${sh(1)}</p>` : ''}
          ${state.leadPlus === 3 && state.width === '10u' ? `<hr class="h-rule"><p class="supporting-headline">${sh(0)}</p><hr class="h-rule"><p class="supporting-headline">${sh(1)}</p><hr class="h-rule"><p class="supporting-headline">${sh(2)}</p>` : ''}
          ${state.leadPlus >= 4 && state.width !== '1u' ? `
            <hr class="h-rule">
            <div style="display:flex;overflow-x:auto;align-items:flex-start;">
              <p class="supporting-headline" style="flex:0 0 ${cfg.carouselTileWidth}px">${sh(0)}</p>
              ${vDivider}
              <p class="supporting-headline" style="flex:0 0 ${cfg.carouselTileWidth}px">${sh(1)}</p>
              ${vDivider}
              <p class="supporting-headline" style="flex:0 0 ${cfg.carouselTileWidth}px">${sh(2)}</p>
              ${vDivider}
              <p class="supporting-headline" style="flex:0 0 ${cfg.carouselTileWidth}px">${sh(3)}</p>
            </div>
          ` : ''}
        </div>
      `;

      const screenHeight = deviceHeights[state.mobilePresetWidth] || 844;
      (_renderTarget || document.getElementById('card-area')).innerHTML =
        (state.width === '1u' && !_contentOnly && !_renderTarget) ? `
          <div class="iphone-frame">
            <div class="iphone-screen" style="${state.phoneClip ? `height:${screenHeight}px` : ''}">
              <div class="iphone-island"></div>
              <div class="iphone-statusbar">
                <span class="iphone-statusbar-time">9:41</span>
                <div class="iphone-statusbar-icons">
                  <svg width="17" height="12" viewBox="0 0 17 12" fill="#111"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
                  <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="#111" stroke-linecap="round"><circle cx="8" cy="11.5" r="1" fill="#111" stroke="none"/><path d="M4.8 8.2a4.5 4.5 0 0 1 6.4 0" stroke-width="1.5"/><path d="M1.5 4.8a9 9 0 0 1 13 0" stroke-width="1.5"/></svg>
                  <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.75" y="0.75" width="20.5" height="10.5" rx="3.25" stroke="#111" stroke-width="1.5" stroke-opacity="0.4"/><rect x="2.5" y="2.5" width="15" height="7" rx="1.5" fill="#111"/><path d="M22.5 4.5v3" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/></svg>
                </div>
              </div>
              <div class="iphone-scroll-area">${cardHTML}</div>
              <div class="iphone-home"></div>
            </div>
          </div>
        ` : cardHTML;

      stateToHash();
      attachInlineEditors();
      _syncCardStateBack();
    }

    /* ── Responsive width snapping ── */

    // Width hierarchy largest → smallest, with minimum viewport needed to fit each
    const WIDTH_ORDER   = ['15u', '12u', '10u', '1u'];
    const WIDTH_MIN_VW  = { '15u': 1040, '12u': 840, '10u': 710, '1u': 0 };

    function getEffectiveWidth() {
      const vw = window.innerWidth;
      // Always step down from the largest width — page.html is fully responsive
      for (let i = 0; i < WIDTH_ORDER.length; i++) {
        if (vw >= WIDTH_MIN_VW[WIDTH_ORDER[i]]) return WIDTH_ORDER[i];
      }
      return '1u';
    }

    let _pageData = null;
    let _lastEffectiveWidth = null;

    function renderPage() {
      if (!_pageData) return;

      const effectiveWidth = getEffectiveWidth();
      if (effectiveWidth === _lastEffectiveWidth) return;  // no change, skip
      _lastEffectiveWidth = effectiveWidth;

      const container = document.getElementById('page-container');
      container.innerHTML = '';

      const mobilePx = window.innerWidth; // fluid — full viewport width

      (_pageData.cards || []).forEach((card, i) => {
        Object.assign(state, JSON.parse(JSON.stringify(defaultState)));
        Object.assign(state, card);
        state.width = effectiveWidth;
        state.mobilePresetWidth = mobilePx;
        state.showGrid = false;

        const wrapper = document.createElement('div');
        wrapper.className = 'card-wrapper';
        if (effectiveWidth !== '1u') {
          const cw = parseInt(widthConfig[effectiveWidth]?.cardWidth || '990', 10);
          wrapper.style.width = (cw - 32) + 'px'; // subtract card's 16px padding on each side
        }
        container.appendChild(wrapper);

        _renderTarget = wrapper;
        render();

        // For mobile, use CSS viewport units so the card always fits regardless
        // of any JS measurement timing issues
        if (effectiveWidth === '1u') {
          wrapper.style.width = '100vw';
          wrapper.style.overflow = 'hidden';
          const cardEl = wrapper.firstElementChild;
          if (cardEl) cardEl.style.width = '100%';
        }
      });

      _renderTarget = null;
    }

    // ── Grid toggle ──────────────────────────────────
    let _gridOn = false;
    function renderGrid() {
      const existing = document.getElementById('full-page-grid');
      if (existing) existing.remove();
      const btn = document.getElementById('grid-toggle-btn');
      btn.classList.toggle('active', _gridOn);
      if (!_gridOn) return;
      const effectiveWidth = getEffectiveWidth();
      if (effectiveWidth === '1u') return;
      const colCounts  = { '10u': 10, '12u': 12, '15u': 15 };
      const cardWidths = { '10u': 660, '12u': 792, '15u': 990 };
      const cols  = colCounts[effectiveWidth];
      const width = cardWidths[effectiveWidth];
      let inner = '<div class="grid-margin"></div>';
      for (let i = 0; i < cols; i++) {
        inner += '<div class="grid-col"></div>';
        if (i < cols - 1) inner += '<div class="grid-gutter"></div>';
      }
      inner += '<div class="grid-margin"></div>';
      const overlay = document.createElement('div');
      overlay.id = 'full-page-grid';
      overlay.innerHTML = `<div class="page-grid-inner" style="width:${width}px">${inner}</div>`;
      document.body.appendChild(overlay);
    }
    document.getElementById('grid-toggle-btn').addEventListener('click', () => {
      _gridOn = !_gridOn;
      renderGrid();
    });

    // Debounced resize — re-render only when the effective width bucket changes
    let _resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(_resizeTimer);
      _resizeTimer = setTimeout(renderPage, 80);
    });

    /* ── Page init ── */
    (async () => {
      const slug = new URLSearchParams(window.location.search).get('page');
      const statusEl = document.getElementById('status');

      if (!slug) {
        statusEl.textContent = 'No page specified.';
        return;
      }

      const { data: page } = await sb.from('pages').select('*').eq('slug', slug).maybeSingle();

      if (!page) {
        statusEl.textContent = 'Page not found.';
        return;
      }

      document.title = page.name + ' — Preview';
      document.getElementById('page-title').textContent = page.name;

      if (!page.cards || page.cards.length === 0) {
        statusEl.textContent = 'This page has no cards yet.';
        return;
      }

      statusEl.remove();
      _pageData = page;

      // Render masthead if set
      const mastheadArea = document.getElementById('masthead-area');
      if (page.masthead_url && page.show_masthead !== false && mastheadArea) {
        const img = document.createElement('img');
        img.src = page.masthead_url;
        img.alt = page.name || 'Masthead';
        mastheadArea.appendChild(img);
        mastheadArea.style.display = '';

        // Shrink logo on scroll
        window.addEventListener('scroll', () => {
          mastheadArea.classList.toggle('stuck', window.scrollY > 8);
        }, { passive: true });
      }

      renderPage();
    })();
  </script>
</body>
</html>
