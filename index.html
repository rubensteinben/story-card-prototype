<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaPo Story Card Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      display: flex;
      font-family: 'Source Sans 3', sans-serif;
      background: #f0f0f0;
    }

    /* Card area — left column */
    #card-area {
      flex: 1 1 auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 32px;
      overflow-y: auto;
      min-height: 100vh;
    }

    /* Properties panel — right column */
    #panel {
      flex: 0 0 320px;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      overflow-y: auto;
      padding: 24px 20px;
    }

    #panel h1 {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 24px;
    }

    /* Panel sections */
    .panel-section {
      border-top: 1px solid #333;
      padding: 16px 0;
    }

    .panel-section-title {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 12px;
    }

    .panel-placeholder {
      font-size: 12px;
      color: #444;
      font-style: italic;
    }

    /* Supporting headlines */
    .supporting-headline {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 20px;
      line-height: 22px;
      color: #111111;
    }

    .h-rule {
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.1);
      margin: 16px 0;
      flex-shrink: 0;
      border: none;
    }

    /* Phone preset buttons */
    .preset-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .preset-btn {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 3px;
      color: #aaa;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11px;
      padding: 5px 8px;
      cursor: pointer;
      line-height: 1;
    }

    .preset-btn:hover {
      border-color: #666;
      color: #e0e0e0;
    }

    .preset-btn.active {
      background: #3a3a3a;
      border-color: #888;
      color: #ffffff;
    }

    .preset-width-label {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }

    /* Panel controls */
    .control-row {
      margin-bottom: 12px;
    }

    .control-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
      display: block;
    }

    .control-input {
      width: 100%;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 3px;
      color: #e0e0e0;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 13px;
      padding: 6px 8px;
      resize: vertical;
    }

    .control-input:focus {
      outline: none;
      border-color: #666;
    }

    .control-btn {
      background: #333;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 6px 12px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
    }

    .control-btn:hover {
      background: #444;
    }

    /* Grid overlay */
    #grid-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: row;
      pointer-events: none;
      z-index: 10;
    }

    .grid-col {
      flex-shrink: 0;
      width: 34px;
      background: rgba(180, 160, 220, 0.22);
    }

    .grid-col-fluid {
      flex: 1;
      background: rgba(180, 160, 220, 0.22);
    }

    .grid-gutter {
      flex-shrink: 0;
      width: 32px;
    }

    .grid-margin {
      flex-shrink: 0;
      width: 16px;
    }

    /* Grid toggle button */
    #grid-toggle {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.12);
      border: none;
      border-radius: 4px;
      padding: 5px 10px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11px;
      color: #777;
      cursor: pointer;
      letter-spacing: 0.04em;
      z-index: 100;
    }

    #grid-toggle:hover {
      background: rgba(0, 0, 0, 0.2);
      color: #444;
    }

    #grid-toggle.active {
      background: rgba(0, 0, 0, 0.22);
      color: #333;
    }

    /* Card */
    #card {
      background: #ffffff;
      padding: 16px;
      overflow: hidden;
      position: relative;
      /* width set dynamically by render() */
    }

    #card-inner {
      display: flex;
      /* flex-direction and gap set dynamically by render() */
    }

    /* text-col and art-col flex set dynamically by render() */

    /* Image */
    .art-image {
      width: 100%;
      object-fit: cover;
      display: block;
    }

    /* Package label */
    .package-label {
      border-top: 1px solid #111111;
      padding-top: 8px;
      padding-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .package-label-text {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 700;
      font-size: 16px;
      line-height: 20px;
      color: #111111;
    }

    .package-label-chevron {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      font-size: 13px;
      color: #111111;
      line-height: 1;
    }

    /* Art wrapper + overlay button */
    .art-wrapper {
      position: relative;
      width: 100%;
    }

    .art-overlay-btn {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: black;
      border-radius: 9999px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: white;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 16px;
      line-height: 16px;
      white-space: nowrap;
    }

    .overlay-label {
      font-weight: 700;
    }

    .overlay-duration {
      font-weight: 300;
    }

    /* Caption */
    .caption {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 400;
      font-size: 12px;
      line-height: 15px;
      color: #595959;
      margin-top: 4px;
    }

    /* Live ticker */
    .ticker-container {
      margin-top: 8px;
    }

    .ticker-live-header {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 900;
      font-size: 12px;
      line-height: 15px;
      color: #ea0017;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .ticker-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .ticker-gutter {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 9px;
      align-self: stretch;
      padding-top: 5px;
    }

    .ticker-dot {
      width: 6px;
      height: 6px;
      background: #ea0017;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .ticker-line {
      flex: 1;
      width: 1px;
      background: #ea0017;
      margin-top: 4px;
      min-height: 8px;
    }

    .ticker-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-bottom: 8px;
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 17.5px;
    }

    .ticker-content--last {
      padding-bottom: 0;
    }

    .ticker-time {
      color: #595959;
    }

    .ticker-text {
      color: #111111;
    }

    /* Kicker label */
    .kicker-label {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 700;
      font-size: 14px;
      line-height: 17.5px;
      color: #111111;
      margin-bottom: 8px;
    }

    /* LIVE label */
    .live-label {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 900;
      font-size: 14px;
      line-height: 14px;
      color: #ea0017;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }

    .live-label-chevron {
      font-size: 16px;
      line-height: 16px;
    }

    /* Headline */
    .headline {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 26px;
      line-height: 1.1;
      color: #111111;
      font-style: normal;
    }

    /* Blurb */
    .blurb {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 20px;
      color: #595959;
      margin-top: 8px;
    }
    /* iPhone frame */
    .iphone-frame {
      display: inline-flex;
      flex-direction: column;
      background: #1c1c1e;
      border-radius: 54px;
      padding: 14px;
      box-shadow: 0 0 0 1px #3a3a3c, 0 40px 80px rgba(0,0,0,0.4);
    }
    .iphone-screen {
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
    }
    .iphone-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #1c1c1e;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
    }
    .iphone-statusbar {
      height: 59px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 10px;
      flex-shrink: 0;
    }
    .iphone-statusbar-time {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-weight: 600;
      font-size: 15px;
      line-height: 18px;
      color: #111;
    }
    .iphone-statusbar-icons {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .iphone-home {
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #fff;
    }
    .iphone-home::after {
      content: '';
      width: 34%;
      height: 5px;
      background: #111;
      border-radius: 3px;
      opacity: 0.3;
    }
    .iphone-scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
    }
    .copy-link-icon-wrap {
      position: relative;
    }
    .copy-link-icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 6px;
      opacity: 0.5;
      transition: opacity 0.15s;
      line-height: 1;
    }
    .copy-link-icon-btn:hover { opacity: 1; }
    .copy-link-tooltip {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 11px;
      font-family: inherit;
      padding: 5px 9px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 200;
    }
    .copy-link-icon-wrap:hover .copy-link-tooltip { display: block; }
    #copy-toast {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-family: inherit;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .import-spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid rgba(0,0,0,0.15);
      border-top-color: #111;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
  </style>
</head>
<body>

  <div id="card-area">
    <!-- Card rendered by JS -->
  </div>
  <button id="grid-toggle">⊞ Grid</button>

  <div id="copy-toast">Link copied to clipboard</div>
  <div id="panel">
    <h1>Story Card</h1>
    <!-- Controls rendered by JS -->
  </div>

  <script>
    const state = {
      headline: 'Lead headline goes here. The ideal length is between 50 and 100 characters.',
      blurb: 'Lead blurb here this is the blurb text. Blurbs appear with the lead story only. Lead blurb here this is the blurb text. Blurbs appear with the lead story only.',
      imageUrl: 'https://picsum.photos/seed/wapo/628/419',
      caption: '(Demetrius Freeman/The Post)',
      // Future properties — not yet wired
      width: '15u',
      mobilePresetWidth: 390,
      phoneClip: true,
      leadPlus: 0,
      showPackageLabel: false,
      packageLabelText: 'Label Text',
      showLive: false,
      showKicker: false,
      kickerSection: 'Analysis',
      kickerAuthor: 'Jennifer Rubin',
      showHeadline: true,
      showBlurb: true,
      showTicker: false,
      tickerItems: [
        { time: '2:47 p.m.', text: 'Harris leads Trump by six points in new post-debate poll, according to a Washington Post–ABC News survey...' },
        { time: '2:31 p.m.', text: 'When Biden announced he would not seek reelection, his closest allies scrambled to understand what the decision...' },
        { time: '2:18 p.m.', text: 'Senate Democrats are pushing for an emergency session to address the latest developments...' },
      ],
      aspectRatio: '3/2',
      portrait: false,
      showOverlayButton: false,
      overlayButtonLabel: 'Play Video',
      showOverlayDuration: true,
      supportingHeadlines: ['', '', '', ''],
      supportingUrls: ['', '', '', ''],
      showGrid: false,
      lastImportedSection: null,
      articleUrl: '',
    };

    const defaultState = JSON.parse(JSON.stringify(state));

    const widthConfig = {
      '1u':  { cardWidth: null,    maxWidth: '767px', flexDir: 'column', gap: '12px', textFlex: '1 1 auto', artFlex: '1 1 auto', tileWidth: null, carouselTileWidth: null },
      '10u': { cardWidth: '660px', maxWidth: null,    flexDir: 'row',    gap: '32px', textFlex: '0 0 298px', artFlex: '0 0 298px', tileWidth: 188,  carouselTileWidth: 232 },
      '12u': { cardWidth: '792px', maxWidth: null,    flexDir: 'row',    gap: '32px', textFlex: '0 0 232px', artFlex: '0 0 496px', tileWidth: 232,  carouselTileWidth: 200 },
      '15u': { cardWidth: '990px', maxWidth: null,    flexDir: 'row',    gap: '32px', textFlex: '0 0 298px', artFlex: '0 0 628px', tileWidth: 298,  carouselTileWidth: 232 },
    };

    const STOP_WORDS = new Set([
      'a','an','the','and','or','but','in','on','at','to','for','of','with',
      'by','from','is','are','was','were','be','been','has','have','had',
      'it','its','this','that','these','those','as','up','out','into','than',
      'about','after','before','over','under','between','through','during',
      'what','who','how','when','where','why','which','will','would','could',
      'should','may','might','can','do','did','does','not','no','new','says',
      'say','said','his','her','their','they','he','she','we','us','you','i',
      'more','than','just','also','back','now','then','so','if','all','one',
      'two','three','four','five','six','seven','eight','nine','ten',
    ]);

    function getHeadlineKeywords(headline) {
      return headline
        .replace(/[^a-z0-9\s]/gi, ' ')
        .split(/\s+/)
        .map(w => w.toLowerCase())
        .filter(w => w.length > 2 && !STOP_WORDS.has(w))
        .slice(0, 6)
        .join(' ');
    }

    function syncSuggestBtn() {
      const btn = document.getElementById('suggest-related-btn');
      if (!btn) return;
      const imported = !!state.lastImportedSection;
      if (imported) {
        btn.textContent = 'Suggest related articles';
        btn.disabled = false;
        btn.style.background = '#fff';
        btn.style.color = '#111';
        btn.style.borderColor = '#555';
        btn.style.fontWeight = '600';
        btn.style.cursor = 'pointer';
      } else {
        btn.textContent = 'Import an article first';
        btn.disabled = true;
        btn.style.background = 'transparent';
        btn.style.color = '#555';
        btn.style.borderColor = '#333';
        btn.style.fontWeight = 'normal';
        btn.style.cursor = 'default';
      }
    }

    function getWaPoSection(url) {
      try {
        const path = new URL(url).pathname;
        return path.split('/').filter(Boolean)[0] || null;
      } catch (e) { return null; }
    }

    function restoreDefaults() {
      Object.assign(state, JSON.parse(JSON.stringify(defaultState)));
      render();
      buildPanel();
      syncPresets();
    }

    function syncPresets() {
      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.width) === state.mobilePresetWidth);
      });
      const label = document.getElementById('preset-label');
      if (label) label.textContent = `${state.mobilePresetWidth}px`;
    }

    const deviceHeights = { 320: 568, 375: 812, 390: 844, 430: 932 };

    function stateToHash() {
      try {
        history.replaceState(null, '', '#' + btoa(encodeURIComponent(JSON.stringify(state))));
      } catch (e) { /* ignore */ }
    }

    function hashToState() {
      const hash = window.location.hash.slice(1);
      if (!hash) return;
      try {
        Object.assign(state, JSON.parse(decodeURIComponent(atob(hash))));
      } catch (e) { /* invalid hash — ignore, use defaults */ }
    }

    function render() {
      const cfg = widthConfig[state.width];
      const cardStyle = state.width === '1u'
        ? `width:${state.mobilePresetWidth}px`
        : `width:${cfg.cardWidth}`;

      const sh = (i) => {
        const text = state.supportingHeadlines[i] || 'Supporting headline text goes here lorem ipsum dolor sit amet';
        const url = state.supportingUrls && state.supportingUrls[i];
        return url ? `<a href="${url}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;">${text}</a>` : text;
      };
      const vDivider = `<div style="flex:0 0 32px;align-self:stretch;position:relative;"><div style="position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:1px;background:rgba(0,0,0,0.1)"></div></div>`;
      const t1uCard = (item, borderRadius, isLast) => `
        <div style="flex-shrink:0;padding:16px 20px;border:1px solid rgba(0,0,0,0.1);background:white;border-radius:${borderRadius};${!isLast ? 'margin-right:-1px;' : ''}display:flex;flex-direction:column;gap:8px;">
          <div style="display:flex;align-items:center;gap:4px;">
            <div style="width:6px;height:6px;background:#ea0017;border-radius:50%;flex-shrink:0;"></div>
            <p style="font-family:'Source Sans 3',sans-serif;font-weight:400;font-size:12px;line-height:15px;color:#ea0017;white-space:nowrap;">${item.time || '1:00 p.m.'}</p>
          </div>
          <p style="font-family:'Source Sans 3',sans-serif;font-weight:400;font-size:14px;line-height:17.5px;color:#111;width:208px;overflow:hidden;text-overflow:ellipsis;">${item.text || 'Update text goes here'}</p>
        </div>
      `;

      const cardHTML = `
        <div id="card" style="${cardStyle}">
          ${state.showPackageLabel ? `
            <div class="package-label">
              <span class="package-label-text">${state.packageLabelText}</span>
              <span class="package-label-chevron">›</span>
            </div>
          ` : ''}
          <div id="card-inner" style="flex-direction:${cfg.flexDir};gap:${cfg.gap}">
            <div id="text-col" style="flex:${cfg.textFlex}">
              ${state.showKicker ? `<p class="kicker-label">${state.kickerSection}</p>` : ''}
              ${state.showLive ? `<div class="live-label"><span>LIVE</span></div>` : ''}
              ${state.showHeadline ? `${state.articleUrl ? `<a href="${state.articleUrl}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;display:block;">` : ''}<p class="headline">${state.headline}</p>${state.articleUrl ? `</a>` : ''}` : ''}
              ${state.showTicker && state.width !== '1u' && state.showBlurb ? `
                <div class="ticker-container">
                  <p class="ticker-live-header">LIVE</p>
                  <div class="ticker-item">
                    <div class="ticker-gutter">
                      <div class="ticker-dot"></div>
                      <div class="ticker-line"></div>
                    </div>
                    <div class="ticker-content">
                      <p class="ticker-time">${state.tickerItems[0].time || '1:00 p.m.'}</p>
                      <p class="ticker-text">${state.tickerItems[0].text || 'Update text goes here'}</p>
                    </div>
                  </div>
                  <div class="ticker-item">
                    <div class="ticker-gutter">
                      <div class="ticker-dot"></div>
                      <div class="ticker-line"></div>
                    </div>
                    <div class="ticker-content">
                      <p class="ticker-time">${state.tickerItems[1].time || '1:00 p.m.'}</p>
                      <p class="ticker-text">${state.tickerItems[1].text || 'Update text goes here'}</p>
                    </div>
                  </div>
                  <div class="ticker-item">
                    <div class="ticker-gutter">
                      <div class="ticker-dot"></div>
                    </div>
                    <div class="ticker-content ticker-content--last">
                      <p class="ticker-time">${state.tickerItems[2].time || '1:00 p.m.'}</p>
                      <p class="ticker-text">${state.tickerItems[2].text || 'Update text goes here'}</p>
                    </div>
                  </div>
                </div>
              ` : (!state.showTicker && state.showBlurb ? `<p class="blurb">${state.blurb}</p>` : '')}
              ${state.leadPlus >= 1 && state.leadPlus < 3 && (state.width === '12u' || state.width === '15u') ? `
                <hr class="h-rule">
                <p class="supporting-headline">${sh(0)}</p>
              ` : ''}

          const res = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(url) + '&data.caption.selector=' + encodeURIComponent('[data-testid="lede-art-caption"]') + '&data.caption.type=text');
          const json = await res.json();
          if (json.status !== 'success') throw new Error(json.message || 'Import failed');
const { title, description, image, caption } = json.data;
          if (title) { state.headline = title; document.getElementById('input-headline').value = title; }
          if (description) { state.blurb = description; document.getElementById('input-blurb').value = description; }
          if (caption) { state.caption = caption; document.getElementById('input-caption').value = caption; }
          state.articleUrl = url;
          state.lastImportedSection = getWaPoSection(url);
          syncSuggestBtn();
          render();
          if (image?.url) {
            const proxied = 'https://wsrv.nl/?url=' + encodeURIComponent(image.url);
            status.style.color = '#5cb85c';
            status.textContent = 'Imported. Loading image…';
            const img = new Image();
            img.onload = function () {
              state.imageUrl = proxied;
              render();
              const s = document.getElementById('import-status');
              if (s) { s.textContent = 'Imported.'; }
            };
            img.onerror = function () {
              const s = document.getElementById('import-status');
              if (s) { s.textContent = 'Imported. (Image unavailable)'; }
            };
            img.src = proxied;
          } else {
            status.style.color = '#5cb85c';
            status.textContent = 'Imported.';
          }
        } catch (e) {
          status.style.color = '#c00';
          status.textContent = 'Error: ' + e.message;
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'Import';
        }
      });
    }

    hashToState();
    render();
    buildPanel();
    syncPresets();
    syncSuggestBtn();
  </script>

  <script>
    // Dev live-reload: polls for file changes and reloads when detected
    (function () {
      let lastModified = '';
      setInterval(async function () {
        try {
          const res = await fetch(window.location.pathname, { method: 'HEAD', cache: 'no-cache' });
          const mod = res.headers.get('last-modified');
          if (mod && lastModified && mod !== lastModified) { location.reload(); }
          if (mod) lastModified = mod;
        } catch (e) {}
      }, 1000);
    })();
  </script>

</body>
